<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Talent | CreatorChain Builders</title>
    <link rel="icon" href="https://creatorchain.network/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #8B5CF6;
            --accent: #00F5A0;
            --bg: #F8FAFC;
            --black: #000000;
            --white: #FFFFFF;
            --muted: #64748B;
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            font-family: var(--font-main); 
            color: var(--black);
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .mono { font-family: var(--font-mono); }
        .outline { -webkit-text-stroke: 1.5px var(--black); color: transparent; }

        /* Nav */
        nav {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--black);
            background: var(--white);
            position: sticky;
            top: 0;
            z-index: 10000;
        }
        .logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            cursor: pointer;
            user-select: none;
        }
        .btn {
            padding: 12px 24px;
            border: 2px solid var(--black);
            font-family: var(--font-mono);
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 4px 4px 0 var(--black);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--black); }
        .btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--black); }
        .btn-black { background: var(--black); color: var(--white); }
        .btn-accent { background: var(--accent); color: var(--black); }

        nav {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--black);
            background: var(--white);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* EXPLORE DROPDOWN */
        .explore-dropdown { position: relative; display: inline-block; }
        .explore-btn { background: var(--black); color: var(--accent); border: 2px solid var(--black); padding: 8px 16px; font-family: var(--font-mono); font-weight: 700; cursor: pointer; box-shadow: 4px 4px 0 var(--accent); transition: all 0.2s; }
        .explore-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--accent); }
        .explore-menu { position: absolute; top: 100%; right: 0; margin-top: 8px; background: var(--black); border: 2px solid var(--accent); box-shadow: 8px 8px 0 rgba(0,0,0,0.2); min-width: 200px; display: none; flex-direction: column; z-index: 10006; padding: 5px; }
        .explore-menu.show { display: flex; }
        .explore-item { padding: 12px 16px; text-decoration: none; color: #fff; font-size: 13px; font-weight: 700; font-family: var(--font-mono); transition: 0.1s; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #333; text-align: left; }
        .explore-item:last-child { border-bottom: none; }
        .explore-item:hover { background: var(--accent); color: #000; }
        .explore-item span { font-size: 16px; }

        /* USER DROPDOWN */
        .user-dropdown-container { position: relative; display: inline-block; }
        .user-dropdown-trigger { display: flex; align-items: center; gap: 10px; background: var(--white); padding: 5px 12px 5px 5px; border: 2px solid var(--black); cursor: pointer; transition: 0.1s; box-shadow: 3px 3px 0 var(--black); }
        .user-dropdown-trigger:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--black); }
        .user-dropdown-trigger img { width: 32px; height: 32px; border-radius: 0; border: 1px solid var(--black); object-fit: cover; }
        .user-dropdown-trigger span { font-weight: 700; font-size: 13px; color: var(--black); font-family: var(--font-mono); }
        .user-dropdown-menu { position: absolute; top: 100%; right: 0; margin-top: 10px; background: var(--white); border: 3px solid var(--black); box-shadow: 8px 8px 0 var(--black); min-width: 180px; display: none; flex-direction: column; z-index: 10005; padding: 5px; }
        .user-dropdown-menu.show { display: flex; }
        .user-dropdown-menu a { padding: 12px 16px; text-decoration: none; color: var(--black); font-size: 12px; font-weight: 700; font-family: var(--font-mono); transition: 0.1s; display: block; border-bottom: 1px solid #eee; text-align: left; }
        .user-dropdown-menu a:last-child { border-bottom: none; }
        .user-dropdown-menu a:hover { background: var(--accent); color: #000; }

        .logo { font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }

        .hero {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(135deg, #f0f7ff 0%, #fff 100%);
            border-bottom: 3px solid var(--black);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .search-card {
            background: var(--white);
            border: 4px solid var(--black);
            padding: 40px;
            margin-top: -60px;
            box-shadow: 15px 15px 0 var(--accent);
            position: relative;
        }

        .field { margin-bottom: 25px; }
        .field label { 
            display: block; 
            font-weight: 800; 
            font-size: 14px; 
            text-transform: uppercase; 
            margin-bottom: 10px; 
            letter-spacing: 1px;
        }

        .skills-box {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px;
            border: 2px solid var(--black);
            min-height: 60px;
            background: #fdfdfd;
        }

        .skill-chip {
            padding: 4px 12px;
            background: #000;
            color: #fff;
            font-family: var(--font-mono);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid var(--black);
        }

        .skill-chip .remove { cursor: pointer; color: var(--accent); font-weight: 900; }

        .skills-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .skill-suggest-chip {
            padding: 6px 14px;
            background: var(--white);
            border: 2px solid var(--black);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .skill-suggest-chip:hover { background: var(--accent); }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--black);
            font-family: var(--font-mono);
            font-size: 14px;
            background: var(--white);
            outline: none;
        }

        .results-section { margin-top: 60px; padding-bottom: 100px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .profile-card {
            background: var(--white);
            border: 3px solid var(--black);
            padding: 0;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
            position: relative;
        }
        .profile-card:hover { transform: translate(-4px, -4px); box-shadow: 8px 8px 0 var(--black); }

        .match-badge {
            position: absolute;
            top: -15px;
            right: 20px;
            background: var(--accent);
            color: var(--black);
            padding: 5px 15px;
            font-family: var(--font-mono);
            font-weight: 900;
            font-size: 12px;
            border: 2px solid var(--black);
            z-index: 10;
        }

        .card-header {
            padding: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
            background: #f9fafb;
            border-bottom: 2px solid var(--black);
        }

        .avatar {
            width: 64px;
            height: 64px;
            border: 2px solid var(--black);
            object-fit: cover;
            background: #eee;
        }

        .card-body { padding: 25px; flex: 1; }
        .card-footer { 
            padding: 15px 25px; 
            border-top: 2px solid var(--black);
            display: flex;
            justify-content: space-between;
            background: #fdfdfd;
        }

        /* OPTIMIZED HYPER-BRUTALIST PROFILE CARD */
        #profile-card-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10005; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); padding: 20px; }
        .p-card { background: #fff; border: 4px solid var(--black); box-shadow: 10px 10px 0 var(--black); width: 100%; max-width: 480px; position: relative; overflow: visible; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .p-card-header { height: 100px; background: var(--accent); border-bottom: 4px solid var(--black); position: relative; overflow: visible; }
        .p-card-header::after { content: ''; position: absolute; inset: 0; opacity: 0.2; background-image: radial-gradient(var(--black) 1.5px, transparent 0); background-size: 8px 8px; }
        
        .p-card-avatar-box { width: 80px; height: 80px; border: 4px solid var(--black); background: #fff; box-shadow: 6px 6px 0 var(--black); position: absolute; top: 30px; left: 20px; z-index: 100; overflow: hidden; }
        .p-card-avatar { width: 100%; height: 100%; object-fit: cover; }
        
        .p-card-body { padding: 40px 20px 20px; position: relative; }
        .p-card-name { font-size: 24px; font-weight: 900; color: var(--black); text-transform: uppercase; letter-spacing: -1px; margin-bottom: 0; margin-top: 20px; }
        .p-card-handle { font-family: var(--font-mono); font-size: 13px; color: #666; margin-bottom: 15px; }
        .p-card-bio { font-size: 14px; color: #444; line-height: 1.5; margin-bottom: 25px; font-weight: 500; }
        
        .p-card-section { margin-bottom: 25px; }
        .p-card-section-title { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #666; display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .p-card-section-title::after { content: ''; height: 2px; flex: 1; background: var(--black); }
        
        .p-card-socials { display: flex; gap: 12px; }
        .p-card-social-btn { width: 44px; height: 44px; border: 3px solid var(--black); background: #fff; display: flex; align-items: center; justify-content: center; color: var(--black); transition: transform 0.1s; }
        .p-card-social-btn:hover { transform: translate(-3px, -3px); box-shadow: 4px 4px 0 var(--black); }
        .p-card-social-btn svg { width: 22px; height: 22px; }

        .p-card-skills { display: flex; flex-wrap: wrap; gap: 8px; }
        .p-card-skill-tag { background: #fff; color: var(--black); padding: 8px 16px; border: 3px solid var(--black); font-size: 13px; font-weight: 800; box-shadow: 4px 4px 0 var(--black); }

        .p-card-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 480px) {
            .p-card-meta-grid { grid-template-columns: 1fr; }
            .p-card-body { padding: 30px 15px 15px; }
            .p-card { width: calc(100% - 20px); }
        }

        .p-card-meta-card { background: #fff; padding: 15px; border: 3px solid var(--black); display: flex; align-items: center; gap: 12px; }
        .p-card-meta-icon { width: 32px; height: 32px; border: 2px solid var(--black); display: flex; align-items: center; justify-content: center; color: var(--black); flex-shrink: 0; }
        .p-card-meta-info { display: flex; flex-direction: column; }
        .p-card-meta-label { font-size: 9px; font-weight: 800; color: #888; text-transform: uppercase; }
        .p-card-meta-value { font-size: 13px; font-weight: 900; color: var(--black); }

        .p-card-footer { margin-top: 10px; }
        .p-card-share-btn { width: 100%; padding: 18px; background: var(--accent); color: var(--black); border: 4px solid var(--black); font-size: 14px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 6px 6px 0 var(--black); transition: transform 0.1s; }
        .p-card-share-btn:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0 var(--black); }

        .p-card-close { position: absolute; top: -10px; right: -10px; background: var(--black); color: white; border: 2px solid #fff; width: 32px; height: 32px; cursor: pointer; z-index: 1000; font-weight: 900; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .p-card-close:hover { background: #333; transform: scale(1.1); }
        .p-card-close:hover { background: #333; }

        /* Dropdowns & Nav Sync */
        .explore-dropdown, .user-dropdown-container { position: relative; display: inline-block; }
        .explore-btn, .user-dropdown-trigger {
            background: var(--white);
            border: 3px solid var(--black);
            padding: 8px 16px;
            font-family: var(--font-mono);
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.1s;
        }
        .explore-btn:hover, .user-dropdown-trigger:hover {
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0 var(--black);
        }
        .explore-menu, .user-dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            width: 240px;
            background: var(--white);
            border: 3px solid var(--black);
            box-shadow: 8px 8px 0 var(--black);
            z-index: 10005;
            display: none;
            padding: 10px 0;
            margin-top: 5px;
        }
        .explore-menu.show, .user-dropdown-menu.show { display: block; }
        .explore-item, .user-dropdown-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            text-decoration: none;
            color: var(--black);
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 13px;
            transition: all 0.2s;
        }
        .explore-item:hover, .user-dropdown-menu a:hover {
            background: var(--accent);
            padding-left: 25px;
        }
        .user-dropdown-trigger img {
            width: 24px;
            height: 24px;
            border: 2px solid var(--black);
            object-fit: cover;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: var(--black);
            color: var(--white);
            padding: 15px 30px;
            font-family: var(--font-mono);
            font-weight: 700;
            z-index: 3000;
            display: none;
            border: 2px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @media (max-width: 768px) {
            .search-card { padding: 25px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo" style="text-decoration:none; color:inherit;">CREATOR<span class="outline">CHAIN</span></a>
        <div style="display:flex; gap:15px; align-items:center;">
            <div id="auth-nav-box" style="display:inline-flex;">
                <button class="btn btn-black btn-sm" style="padding: 8px 16px; font-size: 12px; box-shadow: 2px 2px 0 var(--black);" onclick="signInWithX()"><i>𝕏</i> SIGN IN</button>
            </div>
            <div class="explore-dropdown">
                <button class="explore-btn" onclick="toggleExplore()">EXPLORE ▼</button>
                <div class="explore-menu" id="exploreMenu">
                    <a href="/" class="explore-item"><span>🏠</span> HOME</a>
                    <a href="/talent.html" class="explore-item"><span>✨</span> FIND TALENT</a>
                    <a href="/?submit=true" class="explore-item"><span>🚀</span> SUBMIT PROJECT</a>
                    <a href="/?track=true" class="explore-item"><span>📋</span> TRACK SUBMISSION</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1 style="font-size: 48px; margin-bottom: 10px;">Find <span class="outline">Builders</span></h1>
            <p style="font-weight: 600; color: var(--muted);">The premier network for high-performance Web3 talent discovery.</p>
        </div>
    </header>

    <main class="container">
        <section class="search-card">
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:30px;">
                <div class="field">
                    <label>Required Skills</label>
                    <div id="tm-skills-box" class="skills-box">
                        <!-- Selected skills here -->
                    </div>
                    <div class="skills-suggestions" id="tm-suggested-skills">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div style="display:flex; flex-direction:column; gap:20px;">
                    <div class="field">
                        <label>Experience Level</label>
                        <select id="tm-exp-level">
                            <option value="any">Any Experience</option>
                            <option value="beginner">Beginner</option>
                            <option value="intermediate">Intermediate</option>
                            <option value="advanced">Advanced</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Work Type</label>
                        <select id="tm-work-type">
                            <option value="any">Any Work Type</option>
                            <option value="part-time">Part-Time</option>
                            <option value="full-time">Full-Time</option>
                            <option value="freelance">Freelance</option>
                        </select>
                    </div>
                </div>
            </div>

            <div style="margin-top: 30px; text-align: center;">
                <button class="btn btn-accent" style="width:100%; max-width:400px;" id="tm-match-btn" onclick="runTalentMatch()">
                    SEARCH BUILDER NETWORK
                </button>
            </div>
        </section>

        <section class="results-section" id="tm-results" style="display:none;">
            <h2 style="font-size: 24px; margin-bottom: 20px;">
                <span style="background:var(--accent); display:inline-block; width:15px; height:15px; border:2px solid #000; margin-right:10px;"></span>
                Top Matches Found (<span id="tm-match-count" style="color:var(--primary);">0</span>)
            </h2>
            <div class="grid" id="tm-match-grid">
                <!-- Results cards -->
            </div>
        </section>
    </main>

    <!-- Modal for Detailed Profile -->
    <div id="profile-card-modal" class="modal">
        <div class="modal-content" id="profile-card-content">
            <!-- Rendered by JS -->
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const SUPABASE_URL = 'https://mwefmtmcljdsptcgowmb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_SdGsB-hhvxF2-rq_fBiM0A_y3_mQn2n';
        
        let db;

        async function init() {
            try {
                db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                checkUser();
                initUnifiedSkills();
            } catch (e) {
                console.error("Initialization error:", e);
                showToast("Failed to connect to network.", true);
            }
        }

        async function signInWithX() {
            const { error } = await db.auth.signInWithOAuth({
                provider: 'x',
                options: { redirectTo: window.location.origin + '/talent.html' }
            });
            if (error) showToast('Auth failed. Login with X is not configured.', true);
        }

        async function signOut() {
            await db.auth.signOut();
            window.location.reload();
        }

        async function checkUser() {
            const { data: { user } } = await db.auth.getUser();
            if (user) updateUIForUser(user);
        }

        function updateUIForUser(user) {
            const profile = user.user_metadata;
            const html = `
                <div class="user-dropdown-container">
                    <div class="user-dropdown-trigger" onclick="document.getElementById('userDropdownMenu').classList.toggle('show')">
                        <img src="${profile.avatar_url || 'https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png'}" alt="">
                        <span>${profile.user_name || profile.full_name || 'User'}</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square" stroke-linejoin="round" style="margin-left: 4px;"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                    <div class="user-dropdown-menu" id="userDropdownMenu">
                        <a href="#" onclick="openPublicProfile('${profile.user_name}'); document.getElementById('userDropdownMenu').classList.remove('show'); return false;">👤 VIEW PROFILE</a>
                        <a href="/?profile=true" style="text-decoration:none;">✏️ EDIT PROFILE</a>
                        <div style="height: 2px; background: var(--black); margin: 2px 0;"></div>
                        <a href="#" onclick="signOut(); return false;" style="color: #ef4444;">🚪 LOGOUT</a>
                    </div>
                </div>
            `;
            document.getElementById('auth-nav-box').innerHTML = html;
        }

        const GLOBAL_SKILLS = [
            'Frontend', 'Backend', 'Fullstack', 'Blockchain', 'Solidity', 'Rust', 'Cairo', 'Python', 'Javascript',
            'Graphic Design', 'Video Editing', 'Content Creation', 'Writing', 'Research', 'Strategy',
            'Community Manager', 'Discord Moderator', 'Marketing', 'Growth', 'Project Manager', 
            'Data Analytics', 'DevOps', 'Mobile Dev', 'UI/UX Design', 'DeFi Expert', 'NFT Specialist'
        ];

        let selectedTMSkills = [];

        function initUnifiedSkills() {
            const talentBox = document.getElementById('tm-suggested-skills');
            if (talentBox) {
                talentBox.innerHTML = GLOBAL_SKILLS.map(s => 
                    `<span class="skill-suggest-chip" onclick="addTMSkill('${s}')">${s} +</span>`
                ).join('');
            }
        }

        window.addTMSkill = function(skill) {
            if (!selectedTMSkills.includes(skill)) {
                selectedTMSkills.push(skill);
                renderTMSkills();
            }
        };

        window.removeTMSkill = function(skill) {
            selectedTMSkills = selectedTMSkills.filter(s => s !== skill);
            renderTMSkills();
        };

        function renderTMSkills() {
            const box = document.getElementById('tm-skills-box');
            box.innerHTML = '';
            selectedTMSkills.forEach(skill => {
                const chip = document.createElement('div');
                chip.className = 'skill-chip';
                chip.innerHTML = `${skill} <span class="remove" onclick="removeTMSkill('${skill}')">×</span>`;
                box.appendChild(chip);
            });
        }

        async function runTalentMatch() {
            const btn = document.getElementById('tm-match-btn');
            const grid = document.getElementById('tm-match-grid');
            const countEl = document.getElementById('tm-match-count');
            const reqExp = document.getElementById('tm-exp-level').value;
            const reqWork = document.getElementById('tm-work-type').value;

            btn.textContent = 'SCANNING NETWORK...';
            btn.disabled = true;
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;"><p class="mono">🔍 ANALYZING BUILDER POOL...</p></div>';

            try {
                const { data: users, error } = await db.from('user_profiles')
                    .select('*')
                    .eq('available_for_work', true);

                if (error) throw error;

                const matches = users.map(user => {
                    let score = 0;
                    if (selectedTMSkills.length > 0) {
                        const userSkills = user.skills || [];
                        const matched = selectedTMSkills.filter(s => userSkills.includes(s));
                        score += (matched.length / selectedTMSkills.length) * 60;
                    } else score += 60;

                    if (reqExp !== 'any') {
                        if (user.experience_level === reqExp) score += 20;
                        else score += 10;
                    } else score += 20;

                    if (reqWork !== 'any') {
                        if (user.work_preference === reqWork) score += 20;
                    } else score += 20;

                    return { ...user, matchScore: Math.round(score) };
                })
                .filter(m => m.matchScore > 25)
                .sort((a, b) => b.matchScore - a.matchScore);

                grid.innerHTML = '';
                countEl.textContent = matches.length;

                if (matches.length === 0) {
                    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;"><h3>No builders found matching these criteria.</h3></div>';
                } else {
                    matches.forEach(p => {
                        const card = createCard(p);
                        grid.appendChild(card);
                    });
                }
                document.getElementById('tm-results').style.display = 'block';
                document.getElementById('tm-results').scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                console.error(err);
                showToast('Failed to fetch builders', true);
            } finally {
                btn.textContent = 'SEARCH BUILDER NETWORK';
                btn.disabled = false;
            }
        }

        function createCard(p) {
            const card = document.createElement('div');
            card.className = 'profile-card';
            card.onclick = () => openPublicProfile(p.username);
            card.style.cursor = 'pointer';
            const avatar = p.avatar_url || 'https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png';
            const userSkills = p.skills || [];
            const matched = selectedTMSkills.filter(s => userSkills.includes(s));
            const handle = p.username || 'builder';

            card.innerHTML = `
                <div class="match-badge">${p.matchScore}% MATCH</div>
                <div class="card-header">
                    <img src="${avatar}" class="avatar">
                    <div>
                        <h3 style="margin:0; font-size:18px;">${p.name || 'Anonymous Builder'}</h3>
                        <p class="mono" style="font-size:12px; color:var(--muted); margin:0;">@${handle}</p>
                    </div>
                </div>
                <div class="card-body">
                    <div style="font-size:10px; font-weight:900; text-transform:uppercase; color:var(--primary); margin-bottom:8px;">Matching Expertise</div>
                    <div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:15px;">
                        ${matched.map(s => `<span style="font-size:10px; padding:2px 8px; border:1px solid var(--black); background:rgba(0,245,160,0.1); font-weight:700;">${s}</span>`).join('')}
                    </div>
                    <p style="font-size:13px; color:#444; line-height:1.4; height:3em; overflow:hidden;">${p.bio || 'Building in Web3...'}</p>
                </div>
                <div class="card-footer">
                    <span class="mono" style="font-size:10px; font-weight:700;">${p.experience_level?.toUpperCase() || 'BUILDER'}</span>
                    <span class="mono" style="font-size:10px; font-weight:700; color:var(--primary);">${p.work_preference?.toUpperCase() || 'FLEXIBLE'}</span>
                </div>
            `;
            return card;
        }

        async function openPublicProfile(handle) {
            const modal = document.getElementById('profile-card-modal');
            const content = document.getElementById('profile-card-content');
            modal.style.display = 'flex';
            content.innerHTML = '<div style="padding:40px; text-align:center;"><p class="mono">🔍 FETCHING PROFILE...</p></div>';

            try {
                const { data, error } = await db.from('user_profiles').select('*').eq('username', handle.replace('@','')).single();
                if (error || !data) throw new Error('Profile not found.');
                renderProfileCard(data, data.avatar_url);
            } catch (err) {
                content.innerHTML = `<div style="padding:40px; text-align:center;"><p class="mono" style="color:red;">${err.message.toUpperCase()}</p></div>`;
            }
        }

        function renderProfileCard(profile, avatar) {
            const content = document.getElementById('profile-card-content');
            const skills = profile.skills || [];
            const handle = profile.username || 'anonymous';
            const avatarToUse = profile.avatar_url || avatar || 'https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png';
            
            const icon = (path) => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
            const icons = {
                level: icon('<path d="M6 18h12M6 14h12M6 10h12M6 6h12"/>'),
                work: icon('<rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>'),
                share: icon('<path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/>')
            };

            content.innerHTML = `
                <div class="p-card">
                    <button class="p-card-close" onclick="closeProfileCard()">✕</button>
                    <div class="p-card-header">
                        <div class="p-card-avatar-box">
                            <img src="${avatarToUse}" class="p-card-avatar">
                        </div>
                    </div>
                    
                    <div class="p-card-body">
                        <div class="p-card-name">${profile.name || 'Anonymous'}</div>
                        <div class="p-card-handle">@${handle}</div>

                        <p class="p-card-bio">${profile.bio || 'Building the future of Web3 at CreatorChain. No bio provided yet.'}</p>
                        
                        <div class="p-card-section">
                            <div class="p-card-section-title">Connections</div>
                            <div class="p-card-socials">
                                ${profile.twitter ? `<a href="https://x.com/${profile.twitter.replace('@','')}" target="_blank" class="p-card-social-btn">
                                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                                </a>` : ''}
                                ${profile.github ? `<a href="${profile.github.startsWith('http')?profile.github:'https://github.com/'+profile.github}" target="_blank" class="p-card-social-btn">
                                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
                                </a>` : ''}
                            </div>
                        </div>

                        <div class="p-card-section">
                            <div class="p-card-section-title">Skills & Mastery</div>
                            <div class="p-card-skills">
                                ${skills.length ? skills.map(s => `<span class="p-card-skill-tag">${s}</span>`).join('') : '<span class="mono" style="font-size:12px;">No skills added</span>'}
                            </div>
                        </div>

                        <div class="p-card-section">
                            <div class="p-card-section-title">Work Context</div>
                            <div class="p-card-meta-grid">
                                <div class="p-card-meta-card">
                                    <div class="p-card-meta-icon">${icons.level}</div>
                                    <div class="p-card-meta-info">
                                        <span class="p-card-meta-label">Level</span>
                                        <span class="p-card-meta-value">${profile.experience_level || 'Beginner'}</span>
                                    </div>
                                </div>
                                <div class="p-card-meta-card">
                                    <div class="p-card-meta-icon">${icons.work}</div>
                                    <div class="p-card-meta-info">
                                        <span class="p-card-meta-label">Preference</span>
                                        <span class="p-card-meta-value">${profile.work_preference || 'Part-time'}</span>
                                    </div>
                                </div>
                                <div class="p-card-meta-card">
                                    <div class="p-card-meta-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
                                    <div class="p-card-meta-info">
                                        <span class="p-card-meta-label">Location</span>
                                        <span class="p-card-meta-value">${profile.location || 'GLOBAL'}</span>
                                    </div>
                                </div>
                                <div class="p-card-meta-card">
                                    <div class="p-card-meta-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 21h18M3 7v14M21 7v14M9 21V10l3-3 3 3v11M12 7V3"/></svg></div>
                                    <div class="p-card-meta-info">
                                        <span class="p-card-meta-label">Company</span>
                                        <span class="p-card-meta-value">${profile.company || 'Freelance'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="p-card-footer">
                            <button class="p-card-share-btn" onclick="shareProfile('${handle}')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width:16px; height:16px;"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg> SHARE BUILDER PROFILE
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
        }

        function closeProfileCard() {
            document.getElementById('profile-card-modal').style.display = 'none';
        }

        function shareProfile(handle) {
            const url = `${window.location.origin}/?u=${handle}`;
            navigator.clipboard.writeText(url);
            showToast('Profile link copied! 📋');
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = isError ? '#ef4444' : '#000';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function toggleExplore() {
            document.getElementById('exploreMenu').classList.toggle('show');
        }

        // Close dropdowns when clicking outside
        window.addEventListener('click', function(e) {
            if (!e.target.closest('.explore-dropdown')) {
                const menu = document.getElementById('exploreMenu');
                if (menu && menu.classList.contains('show')) menu.classList.remove('show');
            }
        });

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
