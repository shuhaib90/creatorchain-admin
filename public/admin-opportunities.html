<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportunity Admin | CreatorChain</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --orange: #FF4D00;
            --black: #000000;
            --white: #FFFFFF;
            --font-mono: 'Space Mono', monospace;
        }

        body { background: #fafafa; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 100px; }
        
        .admin-nav { background: #000; color: #fff; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
        .admin-nav h1 { font-size: 18px; font-weight: 900; text-transform: uppercase; margin: 0; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        .dashboard-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }
        .dashboard-header h2 { font-size: 40px; font-weight: 900; text-transform: uppercase; margin: 0; }

        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab-btn {
            background: #fff;
            border: 3px solid #000;
            padding: 10px 20px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 12px;
        }
        .tab-btn.active { background: #000; color: #fff; box-shadow: 4px 4px 0 var(--orange); }

        .admin-section { display: none; }
        .admin-section.active { display: block; }

        /* OPPORTUNITY TABLE */
        .brutal-table { width: 100%; border-collapse: collapse; border: 4px solid #000; background: #fff; box-shadow: 10px 10px 0 #000; }
        .brutal-table th { background: #f0f0f0; border-bottom: 4px solid #000; padding: 15px; text-align: left; font-weight: 900; text-transform: uppercase; font-size: 11px; }
        .brutal-table td { border-bottom: 1px solid #eee; padding: 15px; font-size: 13px; }
        .brutal-table tr:last-child td { border-bottom: none; }

        .status-badge {
            padding: 4px 8px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            border: 1px solid #000;
        }
        .status-pending { background: #FFF9C4; }
        .status-live { background: #C8E6C9; }
        .status-rejected { background: #FFCDD2; }
        .status-closed { background: #E0E0E0; color: #757575; }

        .action-btn {
            padding: 6px 12px;
            border: 2px solid #000;
            font-weight: 900;
            font-size: 10px;
            text-transform: uppercase;
            cursor: pointer;
            background: #fff;
            margin-right: 5px;
        }
        .btn-approve { background: #00E676; }
        .btn-reject { background: #FF5252; color: #fff; }
        .btn-view { background: #000; color: #fff; }

        /* APPLICANT CARDS */
        .applicant-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .applicant-card {
            background: #fff;
            border: 3px solid #000;
            padding: 25px;
            box-shadow: 8px 8px 0 #000;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .applicant-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .applicant-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #f9f9f9; padding: 15px; border: 1px solid #eee; }
        .meta-item { display: flex; flex-direction: column; }
        .meta-label { font-size: 9px; font-weight: 900; color: #888; text-transform: uppercase; }
        .meta-val { font-size: 12px; font-weight: 700; color: #000; word-break: break-all; }

        .hire-actions { display: flex; gap: 10px; margin-top: 10px; }
        .contact-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #000;
            font-weight: 900;
            font-size: 11px;
            text-transform: uppercase;
            text-align: center;
            text-decoration: none;
            color: #000;
            background: #fff;
        }
        .contact-btn:hover { background: #f0f0f0; }
        .contact-btn.x { background: #000; color: #fff; }

        @media (max-width: 800px) {
            .brutal-table { display: block; overflow-x: auto; }
        }

        .broadcast-badge {
            background: #FFD700;
            color: #000;
            padding: 2px 6px;
            font-size: 9px;
            font-weight: 900;
            border: 1px solid #000;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <nav class="admin-nav">
        <h1>CREATORCHAIN // OPS CENTER</h1>
        <div style="font-family: var(--font-mono); font-size: 11px;">ADMIN AUTHORIZED</div>
    </nav>

    <div class="container">
        <div class="dashboard-header">
            <div>
                <h2>Opportunity Hub</h2>
                <p style="font-weight:700; color:#666;">Manage submissions and review talent pipeline.</p>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showSection('pending-sec')">Pending Requests</button>
            <button class="tab-btn" onclick="showSection('live-sec')">Live Opps</button>
            <button class="tab-btn" onclick="showSection('applicants-sec')">All Applicants</button>
        </div>

        <!-- PENDING SECTION -->
        <div id="pending-sec" class="admin-section active">
            <table class="brutal-table">
                <thead>
                    <tr>
                        <th>Project</th>
                        <th>Opportunity</th>
                        <th>Type</th>
                        <th>Contact</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="pending-list">
                    <!-- Dynamic content -->
                </tbody>
            </table>
        </div>

        <!-- LIVE SECTION -->
        <div id="live-sec" class="admin-section">
            <table class="brutal-table">
                <thead>
                    <tr>
                        <th>Project</th>
                        <th>Opportunity</th>
                        <th>Type</th>
                        <th>Applicants</th>
                        <th>Status</th>
                        <th>Access</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="live-list">
                    <!-- Dynamic content -->
                </tbody>
            </table>
        </div>

        <!-- KEY MANAGEMENT MODAL -->
        <div id="key-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center;">
            <div style="background:#fff; border:4px solid #000; padding:40px; width:100%; max-width:500px; box-shadow:20px 20px 0 var(--orange);">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                    <h3 style="margin:0; text-transform:uppercase; font-weight:900;">Project Access Keys</h3>
                    <button onclick="closeKeyModal()" style="background:none; border:none; font-size:24px; cursor:pointer;">✕</button>
                </div>
                
                <div id="keys-loading" style="text-align:center; padding:20px;">LOADING...</div>
                <div id="keys-list" style="display:flex; flex-direction:column; gap:15px; margin-bottom:30px; max-height:300px; overflow-y:auto;"></div>

                <div id="key-gen-zone" style="border-top:2px solid #eee; padding-top:20px;">
                    <p style="font-size:11px; font-weight:900; color:#888; text-transform:uppercase; margin-bottom:15px;">Generate New Access Key for this project</p>
                    <button class="action-btn btn-view" onclick="generateNewKey()" id="gen-btn" style="width:100%; padding:15px;">GENERATE KEY</button>
                </div>
            </div>
        </div>

        <!-- APPLICANTS SECTION -->
        <div id="applicants-sec" class="admin-section">
            <div id="applicant-list" class="applicant-grid">
                <!-- Dynamic cards -->
            </div>
        </div>
    </div>

    <script type="module">
        const supabaseUrl = 'https://mwefmtmcljdsptcgowmb.supabase.co';
        const anonKey = localStorage.getItem('supabase_anon_key');

        let supabase;
        let activeProjectId = null;

        if (anonKey) {
            const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
            supabase = createClient(supabaseUrl, anonKey);
            loadData();
        }

        async function loadData() {
            loadPending();
            loadLive();
            loadApplicants();
        }

        async function loadPending() {
            const { data, error } = await supabase
                .from('opportunities')
                .select('*')
                .eq('status', 'pending');

            const list = document.getElementById('pending-list');
            list.innerHTML = data.length ? '' : '<tr><td colspan="5">No pending requests</td></tr>';
            
            data.forEach(opp => {
                const tr = document.createElement('tr');
                const logoHtml = opp.logo ? `<img src="${opp.logo}" style="height:30px; width:30px; object-fit:contain; border:1px solid #000; padding:2px;">` : `<div style="height:30px; width:30px; background:#eee; display:flex; align-items:center; justify-content:center; border:1px solid #000; font-size:10px;">NA</div>`;
                tr.innerHTML = `
                    <td style="font-weight:900; display:flex; align-items:center; gap:10px;">
                        ${logoHtml}
                        <span>${opp.project_name}</span>
                    </td>
                    <td>${opp.title}</td>
                    <td><span class="status-badge">${opp.type}</span></td>
                    <td>${opp.team_contact}</td>
                    <td>
                        <button class="action-btn btn-approve" onclick="updateStatus('${opp.id}', 'live')">Approve & Broadcast</button>
                        <button class="action-btn btn-reject" onclick="updateStatus('${opp.id}', 'rejected')">Reject</button>
                    </td>
                `;
                list.appendChild(tr);
            });
        }

        async function loadLive() {
            const { data, error } = await supabase
                .from('opportunities')
                .select('*, applications(id)')
                .in('status', ['live', 'closed']);

            const list = document.getElementById('live-list');
            list.innerHTML = data.length ? '' : '<tr><td colspan="6">No opportunities found</td></tr>';
            
            data.forEach(opp => {
                const isLive = opp.status === 'live';
                const tr = document.createElement('tr');
                const logoHtml = opp.logo ? `<img src="${opp.logo}" style="height:30px; width:30px; object-fit:contain; border:1px solid #000; padding:2px;">` : `<div style="height:30px; width:30px; background:#eee; display:flex; align-items:center; justify-content:center; border:1px solid #000; font-size:10px;">NA</div>`;
                tr.innerHTML = `
                    <td style="font-weight:900; display:flex; align-items:center; gap:10px;">
                        ${logoHtml}
                        <span>${opp.project_name}</span>
                    </td>
                    <td>${opp.title}</td>
                    <td>${opp.type}</td>
                    <td style="font-weight:900;">${opp.applications ? opp.applications.length : 0}</td>
                    <td><span class="status-badge ${isLive ? 'status-live' : 'status-closed'}">${opp.status}</span></td>
                    <td>
                        <button class="action-btn" onclick="openKeyModal('${opp.id}')" style="background:#f0f0f0;">🔑 Manage Access</button>
                    </td>
                    <td>
                        <button class="action-btn" onclick="updateStatus('${opp.id}', '${isLive ? 'closed' : 'live'}')">
                            ${isLive ? 'Close' : 'Open'}
                        </button>
                        <button class="action-btn" onclick="broadcastExclusive('${opp.id}')" title="Re-broadcast to Telegram">📣</button>
                        <button class="action-btn btn-reject" onclick="updateStatus('${opp.id}', 'pending')">Pause</button>
                    </td>
                `;
                list.appendChild(tr);
            });
        }

        async function loadApplicants() {
            // Join with user_profiles if needed, but for now we'll show raw data as requested
            const { data, error } = await supabase
                .from('applications')
                .select('*, opportunities(project_name, title)');

            const list = document.getElementById('applicant-list');
            list.innerHTML = data.length ? '' : '<div>No applications yet.</div>';
            
            data.forEach(app => {
                const card = document.createElement('div');
                card.className = 'applicant-card';
                card.innerHTML = `
                    <div class="applicant-header">
                        <div>
                            <div class="meta-label">APPLYING FOR</div>
                            <div style="font-weight:900; font-size:16px;">${app.opportunities.project_name} - ${app.opportunities.title}</div>
                        </div>
                        <div style="font-family: var(--font-mono); font-size:10px;">${new Date(app.created_at).toLocaleDateString()}</div>
                    </div>
                    
                    <div class="meta-item">
                        <div class="meta-label">PITCH MESSAGE</div>
                        <p style="margin:5px 0; font-size:14px; line-height:1.4;">${app.message}</p>
                    </div>

                    <div class="applicant-meta">
                        <div class="meta-item">
                            <div class="meta-label">WALLET ADDRESS</div>
                            <div class="meta-val">${app.user_id}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">PORTFOLIO / LINKS</div>
                            <div class="meta-val">${app.portfolio_links || 'N/A'}</div>
                        </div>
                    </div>

                    <div class="hire-actions">
                        <a href="mailto:?subject=Regarding your application for ${app.opportunities.title}" class="contact-btn">EMAIL APPLICANT</a>
                        <a href="#" class="contact-btn x">CONTACT VIA X</a>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function broadcastExclusive(id) {
            const { data: item } = await supabase.from('opportunities').select('*').eq('id', id).single();
            if (!item) return;

            try {
                const [{ data: profiles }, { data: tgSubscribers }, { data: emailSubscribers }] = await Promise.all([
                    supabase.from('user_profiles').select('telegram_id, telegram_notifications, email, email_notifications, skills, username'),
                    supabase.from('telegram_subscribers').select('chat_id'),
                    supabase.from('subscribers').select('email')
                ]);

                // 1. Prepare Telegram Recipients
                const profileTgIds = (profiles || []).filter(p => p.telegram_notifications && p.telegram_id).map(p => p.telegram_id);
                const globalTgIds = (tgSubscribers || []).map(s => s.chat_id);
                const adminChatId = '2127320399';
                const tgRecipients = Array.from(new Set([...profileTgIds, ...globalTgIds, adminChatId]));

                // 2. Prepare Email Recipients (Skill-based matching)
                const globalEmails = (emailSubscribers || []).map(s => s.email);
                let profileEmails = [];
                
                const itemSkills = Array.isArray(item.tags) ? item.tags : (typeof item.tags === 'string' ? item.tags.split(',') : []);
                
                (profiles || []).forEach(p => {
                    if (p.email && p.email_notifications) {
                        let isMatch = false;
                        if (itemSkills.length > 0 && Array.isArray(p.skills) && p.skills.length > 0) {
                           const pSkills = p.skills.map(s => s.toLowerCase().trim());
                           isMatch = itemSkills.some(s => pSkills.includes(s.toLowerCase().trim()));
                        } else {
                           isMatch = true; // Send to all if no specific skills are required
                        }
                        if (isMatch) profileEmails.push(p.email);
                    }
                });

                const emailRecipients = Array.from(new Set([...globalEmails, ...profileEmails])).filter(Boolean);

                if (tgRecipients.length === 0 && emailRecipients.length === 0) {
                    alert('No subscribers found for Telegram or Email.');
                    return;
                }

                // 3. Send Telegram Broadcast
                if (tgRecipients.length > 0) {
                    await fetch('https://creatorchain.site/api/send-telegram', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            type: 'exclusive_opportunity',
                            payload: {
                                chat_ids: tgRecipients,
                                id: item.id,
                                project_name: item.project_name,
                                category: item.type,
                                reward: item.reward || 'TBA',
                                description: item.title
                            }
                        })
                    }).catch(e => console.error('Telegram broadcast failed:', e));
                }

                // 4. Send Email Broadcast (Resend limits to 50 recipients per request)
                if (emailRecipients.length > 0) {
                    for (let i = 0; i < emailRecipients.length; i += 50) {
                        const batch = emailRecipients.slice(i, i + 50);
                        await fetch('https://creatorchain.site/api/send-email', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                type: 'new_opportunity',
                                payload: {
                                    to: batch,
                                    project_name: item.project_name,
                                    description: item.title,
                                    budget: item.reward || 'TBA'
                                }
                            })
                        }).catch(e => console.error('Email broadcast failed:', e));
                    }
                }

                alert(`🚀 Broadcast sent! Telegram: ${tgRecipients.length} | Email: ${emailRecipients.length}`);

                // 5. Notify Submitter (Email & Telegram)
                // 5. Notify Submitter (Email & Telegram)
                if (item.submitter_email && item.submitter_email.includes('@')) {
                    await fetch('https://creatorchain.site/api/send-email', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            type: 'opportunity_approved',
                            payload: {
                                to: item.submitter_email.trim(),
                                project_name: item.project_name,
                                title: item.title
                            }
                        })
                    }).catch(e => console.error('Submitter email failed:', e));
                }

                const tgHandle = item.team_contact || '';
                if (tgHandle) {
                    const handle = tgHandle.replace('@', '').trim();
                    const submitterProfile = (profiles || []).find(p => p.username && p.username.toLowerCase() === handle.toLowerCase());
                    if (submitterProfile && submitterProfile.telegram_id) {
                        await fetch('https://creatorchain.site/api/send-telegram', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                type: 'opportunity_approved',
                                payload: {
                                    chat_ids: [submitterProfile.telegram_id],
                                    project_name: item.project_name
                                }
                            })
                        }).catch(e => console.error('Submitter telegram failed:', e));
                    }
                }

            } catch (err) {
                console.error('Broadcast Error:', err);
                alert('Broadcast failed: ' + err.message);
            }
        }

        window.broadcastExclusive = broadcastExclusive;

        window.updateStatus = async (id, status) => {
            const { data, error } = await supabase
                .from('opportunities')
                .update({ status: status })
                .eq('id', id);

            if (error) {
                alert(error.message);
            } else {
                if (status === 'live') {
                    broadcastExclusive(id);
                }
                loadData();
            }
        };

        window.showSection = (id) => {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        };

        window.showSection = (id) => {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            // Re-finding the button because global event is tricky with modules
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => {
                if (btn.getAttribute('onclick').includes(id)) btn.classList.add('active');
            });
        };

        // ACCESS KEY MANAGEMENT
        window.openKeyModal = async (id) => {
            activeProjectId = id;
            document.getElementById('key-modal').style.display = 'flex';
            loadProjectKeys();
        };

        window.closeKeyModal = () => {
            document.getElementById('key-modal').style.display = 'none';
            activeProjectId = null;
        };

        window.loadProjectKeys = async () => {
            const loading = document.getElementById('keys-loading');
            const list = document.getElementById('keys-list');
            loading.style.display = 'block';
            list.innerHTML = '';

            const { data, error } = await supabase
                .from('project_access_keys')
                .select('*')
                .eq('project_id', activeProjectId)
                .order('created_at', { ascending: false });

            loading.style.display = 'none';
            
            if (data && data.length > 0) {
                data.forEach(key => {
                    const div = document.createElement('div');
                    div.style = 'padding:15px; border:2px solid #000; display:flex; justify-content:space-between; align-items:center;';
                    div.innerHTML = `
                        <div>
                            <div style="font-family:var(--font-mono); font-weight:900; font-size:14px; ${key.status === 'revoked' ? 'text-decoration:line-through; opacity:0.5;' : ''}">${key.access_key}</div>
                            <div style="font-size:9px; color:#888;">${key.status.toUpperCase()} • ${new Date(key.created_at).toLocaleDateString()}</div>
                        </div>
                        <div style="display:flex; gap:5px;">
                            ${key.status === 'active' ? `
                                <button class="action-btn" onclick="copyToClipboard('${key.access_key}')">COPY</button>
                                <button class="action-btn btn-reject" onclick="revokeKey('${key.id}')">REVOKE</button>
                            ` : ''}
                        </div>
                    `;
                    list.appendChild(div);
                });
            } else {
                list.innerHTML = '<p style="text-align:center; font-size:12px; color:#888;">No access keys generated yet.</p>';
            }
        };

        window.generateNewKey = async () => {
            const btn = document.getElementById('gen-btn');
            btn.disabled = true;
            btn.textContent = 'GENERATING...';

            // Generate unique PRJ-XXXXXX key
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let randomStr = '';
            for (let i = 0; i < 6; i++) {
                randomStr += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            const newKey = `PRJ-${randomStr}`;

            const { error } = await supabase
                .from('project_access_keys')
                .insert([{
                    project_id: activeProjectId,
                    access_key: newKey,
                    status: 'active'
                }]);

            btn.disabled = false;
            btn.textContent = 'GENERATE KEY';

            if (error) {
                alert('Generation failed: ' + error.message);
            } else {
                loadProjectKeys();
            }
        };

        window.revokeKey = async (id) => {
            if (!confirm('Are you sure you want to revoke this access key? This action cannot be undone.')) return;
            
            const { error } = await supabase
                .from('project_access_keys')
                .update({ status: 'revoked' })
                .eq('id', id);

            if (error) {
                alert('Revoke failed: ' + error.message);
            } else {
                loadProjectKeys();
            }
        };

        window.copyToClipboard = (text) => {
            navigator.clipboard.writeText(text).then(() => {
                alert('Key copied to clipboard!');
            });
        };

        lucide.createIcons();
    </script>
</body>
</html>
