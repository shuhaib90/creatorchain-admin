<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Talent | CreatorChain Builders</title>
    <link rel="icon" href="/favicon.ico">
    <meta name="description" content="Connect with the best creators, devs, and community leads in the Web3 ecosystem.">
    <meta property="og:title" content="CreatorChain Talent | Find Web3 Builders">
    <meta property="og:description" content="Connect with the best creators, devs, and community leads.">
    <meta property="og:image" content="/logo.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #8B5CF6;
            --accent: #00F5A0;
            --bg: #F8FAFC;
            --black: #000000;
            --white: #FFFFFF;
            --muted: #64748B;
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            font-family: var(--font-main); 
            color: var(--black);
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .mono { font-family: var(--font-mono); }
        .outline { -webkit-text-stroke: 1.5px var(--black); color: transparent; }

        /* Nav */
        nav {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--black);
            background: var(--white);
            position: sticky;
            top: 0;
            z-index: 10000;
        }
        .logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            cursor: pointer;
            user-select: none;
        }
        .btn {
            padding: 12px 24px;
            border: 2px solid var(--black);
            font-family: var(--font-mono);
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 4px 4px 0 var(--black);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--black); }
        .btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--black); }
        .btn-black { background: var(--black); color: var(--white); }
        .btn-accent { background: var(--accent); color: var(--black); }

        nav {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--black);
            background: var(--white);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* EXPLORE DROPDOWN */
        .explore-dropdown { position: relative; display: inline-block; }
        .explore-btn { background: var(--black); color: var(--accent); border: 2px solid var(--black); padding: 8px 16px; font-family: var(--font-mono); font-weight: 700; cursor: pointer; box-shadow: 4px 4px 0 var(--accent); transition: all 0.2s; }
        .explore-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--accent); }
        .explore-menu { position: absolute; top: 100%; right: 0; margin-top: 8px; background: var(--black); border: 2px solid var(--accent); box-shadow: 8px 8px 0 rgba(0,0,0,0.2); min-width: 200px; display: none; flex-direction: column; z-index: 10006; padding: 5px; }
        .explore-menu.show { display: flex; }
        .explore-item { padding: 12px 16px; text-decoration: none; color: #fff; font-size: 13px; font-weight: 700; font-family: var(--font-mono); transition: 0.1s; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #333; text-align: left; }
        .explore-item:last-child { border-bottom: none; }
        .explore-item:hover { background: var(--accent); color: #000; }
        .explore-item span { font-size: 16px; }

        /* USER DROPDOWN */
        .user-dropdown-container { position: relative; display: inline-block; }
        .user-dropdown-trigger { display: flex; align-items: center; gap: 10px; background: var(--white); padding: 5px 12px 5px 5px; border: 2px solid var(--black); cursor: pointer; transition: 0.1s; box-shadow: 3px 3px 0 var(--black); }
        .user-dropdown-trigger:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--black); }
        .user-dropdown-trigger img { width: 32px; height: 32px; border-radius: 0; border: 1px solid var(--black); object-fit: cover; }
        .user-dropdown-trigger span { font-weight: 700; font-size: 13px; color: var(--black); font-family: var(--font-mono); }
        .user-dropdown-menu { position: absolute; top: 100%; right: 0; margin-top: 10px; background: var(--white); border: 3px solid var(--black); box-shadow: 8px 8px 0 var(--black); min-width: 180px; display: none; flex-direction: column; z-index: 10005; padding: 5px; }
        .user-dropdown-menu.show { display: flex; }
        .user-dropdown-menu a { padding: 12px 16px; text-decoration: none; color: var(--black); font-size: 12px; font-weight: 700; font-family: var(--font-mono); transition: 0.1s; display: block; border-bottom: 1px solid #eee; text-align: left; }
        .user-dropdown-menu a:last-child { border-bottom: none; }
        .user-dropdown-menu a:hover { background: var(--accent); color: #000; }

        .logo { font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }

        .hero {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(135deg, #f0f7ff 0%, #fff 100%);
            border-bottom: 3px solid var(--black);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .search-card {
            background: var(--white);
            border: 4px solid var(--black);
            padding: 40px;
            margin-top: -60px;
            box-shadow: 15px 15px 0 var(--accent);
            position: relative;
        }

        .field { margin-bottom: 25px; }
        .field label { 
            display: block; 
            font-weight: 800; 
            font-size: 14px; 
            text-transform: uppercase; 
            margin-bottom: 10px; 
            letter-spacing: 1px;
        }

        .skills-box {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px;
            border: 2px solid var(--black);
            min-height: 60px;
            background: #fdfdfd;
        }

        .skill-chip {
            padding: 4px 12px;
            background: #000;
            color: #fff;
            font-family: var(--font-mono);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid var(--black);
        }

        .skill-chip .remove { cursor: pointer; color: var(--accent); font-weight: 900; }

        .skills-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .skill-suggest-chip {
            padding: 6px 14px;
            background: var(--white);
            border: 2px solid var(--black);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .skill-suggest-chip:hover { background: var(--accent); }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--black);
            font-family: var(--font-mono);
            font-size: 14px;
            background: var(--white);
            outline: none;
        }

        .results-section { margin-top: 60px; padding-bottom: 100px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .profile-card {
            background: var(--white);
            border: 3px solid var(--black);
            padding: 0;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
            position: relative;
        }
        .profile-card:hover { transform: translate(-4px, -4px); box-shadow: 8px 8px 0 var(--black); }

        .match-badge {
            position: absolute;
            top: -15px;
            right: 20px;
            background: var(--accent);
            color: var(--black);
            padding: 5px 15px;
            font-family: var(--font-mono);
            font-weight: 900;
            font-size: 12px;
            border: 2px solid var(--black);
            z-index: 10;
        }

        .card-header {
            padding: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
            background: #f9fafb;
            border-bottom: 2px solid var(--black);
        }

        .avatar {
            width: 64px;
            height: 64px;
            border: 2px solid var(--black);
            object-fit: cover;
            background: #eee;
        }

        .card-body { padding: 25px; flex: 1; }
        .card-footer { 
            padding: 15px 25px; 
            border-top: 2px solid var(--black);
            display: flex;
            justify-content: space-between;
            background: #fdfdfd;
        }

        /* MODAL SYSTEM */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10005; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); padding: 20px; overflow-y: auto; }
        .submit-card { background: #fff; border: 4px solid var(--black); box-shadow: 16px 16px 0 var(--black); max-width: 640px; width: 100%; margin: auto; position: relative; }
        .submit-header { background: var(--black); color: #fff; padding: 30px; border-bottom: 3px solid var(--accent); }
        .submit-header h2 { font-size: 32px; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: -1px; }
        .submit-header p { color: #aaa; font-size: 14px; font-weight: 500; }
        .submit-body { padding: 30px; }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-family: var(--font-mono); font-size: 11px; font-weight: 700; margin-bottom: 8px; color: var(--black); }
        .field input, .field textarea { width: 100%; border: 2px solid var(--black); padding: 12px; font-family: inherit; font-size: 15px; outline: none; border-radius: 0; background: #fff; }
        .field input:focus, .field textarea:focus { border-color: var(--accent); background: #fffdf0; }
        
        .outline { -webkit-text-stroke: 1.5px var(--black); color: transparent; }
        .hero .outline { -webkit-text-stroke: 2px var(--black); }
        nav .outline { -webkit-text-stroke: 1.5px var(--black); }

        /* OPTIMIZED HYPER-BRUTALIST PROFILE CARD */
        #profile-card-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10005; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); padding: 20px; cursor: pointer; }
        #profile-card-modal > div { cursor: default; }
        .p-card { background: #fff; border: 4px solid var(--black); box-shadow: 10px 10px 0 var(--black); width: 100%; max-width: 520px; position: relative; overflow: visible; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .p-card-header { height: 100px; background: var(--accent); border-bottom: 4px solid var(--black); position: relative; overflow: visible; }
        .p-card-header::after { content: ''; position: absolute; inset: 0; opacity: 0.2; background-image: radial-gradient(var(--black) 1.5px, transparent 0); background-size: 8px 8px; }
        
        .p-card-avatar-box { width: 100px; height: 100px; border: 4px solid var(--black); background: #fff; box-shadow: 6px 6px 0 var(--black); position: absolute; top: 30px; left: 30px; z-index: 100; overflow: hidden; }
        .p-card-avatar { width: 100%; height: 100%; object-fit: cover; }
        
        .p-card-body { padding: 40px 30px 20px; position: relative; }
        .p-card-name { font-size: 24px; font-weight: 900; color: var(--black); text-transform: uppercase; letter-spacing: -1px; margin-bottom: 0; margin-top: 20px; }
        .p-card-handle { font-family: var(--font-mono); font-size: 13px; color: #666; margin-bottom: 15px; }
        .p-card-bio { font-size: 14px; color: #444; line-height: 1.5; margin-bottom: 25px; font-weight: 500; }
        
        .p-card-section { margin-bottom: 25px; }
        .p-card-section-title { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #666; display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .p-card-section-title::after { content: ''; height: 2px; flex: 1; background: var(--black); }
        
        .p-card-socials { display: flex; gap: 12px; }
        .p-card-social-btn { width: 44px; height: 44px; border: 3px solid var(--black); background: #fff; display: flex; align-items: center; justify-content: center; color: var(--black); transition: transform 0.1s; }
        .p-card-social-btn:hover { transform: translate(-3px, -3px); box-shadow: 4px 4px 0 var(--black); }
        .p-card-social-btn svg { width: 22px; height: 22px; }

        .p-card-skills { display: flex; flex-wrap: wrap; gap: 8px; }
        .p-card-skill-tag { background: #fff; color: var(--black); padding: 8px 16px; border: 3px solid var(--black); font-size: 13px; font-weight: 800; box-shadow: 4px 4px 0 var(--black); }

        .p-card-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 480px) {
            .p-card-meta-grid { grid-template-columns: 1fr; }
            .p-card-body { padding: 30px 15px 15px; }
            .p-card { width: calc(100% - 20px); }
        }

        .p-card-meta-card { background: #fff; padding: 15px; border: 3px solid var(--black); display: flex; align-items: center; gap: 12px; }
        .p-card-meta-icon { width: 32px; height: 32px; border: 2px solid var(--black); display: flex; align-items: center; justify-content: center; color: var(--black); flex-shrink: 0; }
        .p-card-meta-info { display: flex; flex-direction: column; }
        .p-card-meta-label { font-size: 9px; font-weight: 800; color: #888; text-transform: uppercase; }
        .p-card-meta-value { font-size: 13px; font-weight: 900; color: var(--black); }

        .p-card-footer { margin-top: 10px; }
        .p-card-share-btn { width: 100%; padding: 18px; background: var(--accent); color: var(--black); border: 4px solid var(--black); font-size: 14px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 6px 6px 0 var(--black); transition: transform 0.1s; }
        .p-card-share-btn:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0 var(--black); }

        .p-card-close { position: absolute; top: -10px; right: -10px; background: var(--black); color: white; border: 2px solid #fff; width: 32px; height: 32px; cursor: pointer; z-index: 1000; font-weight: 900; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .p-card-close:hover { background: #333; transform: scale(1.1); }

        /* Dropdowns & Nav Sync */
        .explore-dropdown, .user-dropdown-container { position: relative; display: inline-block; }
        .explore-btn, .user-dropdown-trigger {
            background: var(--white);
            border: 3px solid var(--black);
            padding: 8px 16px;
            font-family: var(--font-mono);
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.1s;
        }
        .explore-btn:hover, .user-dropdown-trigger:hover {
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0 var(--black);
        }
        .explore-menu, .user-dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            width: 240px;
            background: var(--white);
            border: 3px solid var(--black);
            box-shadow: 8px 8px 0 var(--black);
            z-index: 10005;
            display: none;
            padding: 10px 0;
            margin-top: 5px;
        }
        .explore-menu.show, .user-dropdown-menu.show { display: block; }
        .explore-item, .user-dropdown-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            text-decoration: none;
            color: var(--black);
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 13px;
            transition: all 0.2s;
        }
        .explore-item:hover, .user-dropdown-menu a:hover {
            background: var(--accent);
            padding-left: 25px;
        }
        .user-dropdown-trigger img {
            width: 24px;
            height: 24px;
            border: 2px solid var(--black);
            object-fit: cover;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: var(--black);
            color: var(--white);
            padding: 15px 30px;
            font-family: var(--font-mono);
            font-weight: 700;
            z-index: 3000;
            display: none;
            border: 2px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @media (max-width: 768px) {
            .search-card { padding: 25px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
            <a href="/" class="logo" style="text-decoration:none; color:inherit; display:flex; align-items:center;">
                <img src="/logo.png" alt="CreatorChain Logo" style="height:48px; width:auto; object-fit:contain; margin-right:10px;">
                <span>CREATOR<span class="outline">CHAIN</span></span>
            </a>
            <div id="auth-nav-box">
                 <button class="btn btn-black" onclick="signInWithX()">LOGIN WITH X</button>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1 style="font-size: 48px; margin-bottom: 10px;">Find <span class="outline">Builders</span></h1>
            <p style="font-weight: 600; color: var(--muted);">The premier network for high-performance Web3 talent discovery.</p>
        </div>
    </header>

    <main class="container">
        <section class="search-card">
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:30px;">
                <div class="field">
                    <label>Required Skills</label>
                    <div id="tm-skills-box" class="skills-box">
                        <!-- Selected skills here -->
                    </div>
                    <div class="skills-suggestions" id="tm-suggested-skills">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div style="display:flex; flex-direction:column; gap:20px;">
                    <div class="field">
                        <label>Experience Level</label>
                        <select id="tm-exp-level">
                            <option value="any">Any Experience</option>
                            <option value="beginner">Beginner</option>
                            <option value="intermediate">Intermediate</option>
                            <option value="advanced">Advanced</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Work Type</label>
                        <select id="tm-work-type">
                            <option value="any">Any Work Type</option>
                            <option value="part-time">Part-Time</option>
                            <option value="full-time">Full-Time</option>
                            <option value="freelance">Freelance</option>
                        </select>
                    </div>
                </div>
            </div>

            <div style="margin-top: 30px; text-align: center;">
                <button class="btn btn-accent" style="width:100%; max-width:400px;" id="tm-match-btn" onclick="runTalentMatch()">
                    SEARCH BUILDER NETWORK
                </button>
            </div>
        </section>

        <section class="results-section" id="tm-results" style="display:none;">
            <h2 style="font-size: 24px; margin-bottom: 20px;">
                <span style="background:var(--accent); display:inline-block; width:15px; height:15px; border:2px solid #000; margin-right:10px;"></span>
                Top Matches Found (<span id="tm-match-count" style="color:var(--primary);">0</span>)
            </h2>
            <div class="grid" id="tm-match-grid">
                <!-- Results cards -->
            </div>
        </section>
    </main>

    <!-- Modal for Detailed Profile -->
    <div id="profile-card-modal" class="modal" onclick="if(event.target === this) closeProfileCard()">
        <div class="modal-content" id="profile-card-content">
            <!-- Rendered by JS -->
        </div>
    </div>

    <!-- Hire Request Modal -->
    <div id="hire-modal" class="modal" onclick="if(event.target === this) closeHireModal()" style="cursor:pointer; z-index: 10010;">
        <div class="submit-card" onclick="event.stopPropagation()" style="cursor:default; max-width: 450px;">
            <div class="submit-header">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <h2>Send <span class="outline" style="-webkit-text-stroke: 1.5px #fff; color: transparent;">Hire Request</span></h2>
                        <p>Interested in working with <span id="hire-target-name" style="color:var(--primary); font-weight:700;">...</span>?</p>
                    </div>
                    <button onclick="closeHireModal()" style="background:none; border:none; color:#888; font-size:24px; cursor:pointer;">✕</button>
                </div>
            </div>
            <div class="submit-body">
                <form id="hire-form" onsubmit="submitHireRequest(event)">
                    <input type="hidden" id="hire-target-id">
                    <div class="field">
                        <label>YOUR TEAM / COMPANY NAME</label>
                        <input type="text" id="hire-sender-name" placeholder="E.g., CreatorChain Labs" required>
                    </div>
                    <div class="field">
                        <label>CONTACT EMAIL</label>
                        <input type="email" id="hire-email" placeholder="team@example.com" required>
                    </div>
                    <div class="field">
                        <label>TELEGRAM DM LINK (Optional)</label>
                        <input type="text" id="hire-telegram" placeholder="https://t.me/username">
                    </div>
                    <div class="field">
                        <label>APPLICATION / FORM URL (Optional)</label>
                        <input type="url" id="hire-form-url" placeholder="https://forms.gle/...">
                    </div>
                    <div class="field">
                        <label>MESSAGE TO BUILDER</label>
                        <textarea id="hire-message" rows="3" placeholder="Describe the opportunity..." required></textarea>
                    </div>
                    <div style="display:flex; gap:12px; margin-top:20px;">
                        <button type="button" class="btn btn-white" style="flex:1;" onclick="closeHireModal()">CANCEL</button>
                        <button type="submit" class="btn btn-primary" style="flex:2;" id="hire-submit-btn">SEND REQUEST &rarr;</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Inbox Modal -->
    <div id="inbox-modal" class="modal" onclick="if(event.target === this) closeInbox()" style="cursor:pointer; z-index: 10020;">
        <div class="submit-card" style="max-width: 700px; cursor:default;" onclick="event.stopPropagation()">
            <div class="submit-header" style="background:var(--primary); border-bottom-color:var(--black);">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <h2 style="color:var(--black);">Your <span class="outline" style="-webkit-text-stroke: 1.5px var(--black);">Inbox</span></h2>

        function timeAgo(date) {
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " years ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " months ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + " days ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + " hours ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + " minutes ago";
            return Math.floor(seconds) + " seconds ago";
        }

            const talentBox = document.getElementById('tm-suggested-skills');

        async function runTalentMatch() {
            const btn = document.getElementById('tm-match-btn');
            const grid = document.getElementById('tm-match-grid');
            const countEl = document.getElementById('tm-match-count');
            const reqExp = document.getElementById('tm-exp-level').value;
            const reqWork = document.getElementById('tm-work-type').value;

            btn.textContent = 'SCANNING NETWORK...';
            btn.disabled = true;
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;"><p class="mono">🔍 ANALYZING BUILDER POOL...</p></div>';

            try {
                const { data: users, error } = await db.from('user_profiles')
                    .select('*')
                    .eq('available_for_work', true);

                if (error) throw error;

                const matches = users.filter(user => {
                    // 1. Skill Filter: Must have at least one of the selected skills (if any selected)
                    let matchedSkills = [];
                    if (selectedTMSkills.length > 0) {
                        const userSkills = user.skills || [];
                        matchedSkills = selectedTMSkills.filter(s => userSkills.includes(s));
                        if (matchedSkills.length === 0) return false;
                    }

                    // 2. Experience Filter: Must match exactly if not 'any'
                    if (reqExp !== 'any' && user.experience_level !== reqExp) return false;

                    // 3. Work Type Filter: Must match exactly if not 'any'
                    if (reqWork !== 'any' && user.work_preference !== reqWork) return false;

                    // Add matched skills for rendering
                    user._matchedSkills = matchedSkills;
                    return true;
                });

                // Simple score for sorting
                matches.sort((a, b) => {
                    const aCount = (a.skills || []).length;
                    const bCount = (b.skills || []).length;
                    return bCount - aCount;
                });

                grid.innerHTML = '';
                countEl.textContent = matches.length;

                if (matches.length === 0) {
                    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;"><h3>No builders found matching these criteria.</h3></div>';
                } else {
                    matches.forEach(p => {
                        const card = createCard(p);
                        grid.appendChild(card);
                    });
                }
                document.getElementById('tm-results').style.display = 'block';
                document.getElementById('tm-results').scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                console.error(err);
                showToast('Failed to fetch builders', true);
            } finally {
                btn.textContent = 'SEARCH BUILDER NETWORK';
                btn.disabled = false;
            }
        }

            t.style.background = isError ? '#ef4444' : '#000';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function toggleExplore() {
            document.getElementById('exploreMenu').classList.toggle('show');
        }

        // Close dropdowns when clicking outside
        window.addEventListener('click', function(e) {
            if (!e.target.closest('.explore-dropdown')) {
                const menu = document.getElementById('exploreMenu');
                if (menu && menu.classList.contains('show')) menu.classList.remove('show');
            }
        });

        function renderFooter() {
            const footer = document.createElement('footer');
            footer.style.cssText = "padding: 60px 0; border-top: 4px solid var(--black); background: #fff; margin-top: 80px;";
            footer.innerHTML = `
                <div class="container" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:30px;">
                    <a href="/" style="display:flex; align-items:center; text-decoration:none; color:inherit; font-weight:900; font-size:20px;">
                        <img src="/logo.png" alt="Logo" style="height:44px; width:auto; object-fit:contain; margin-right:10px;">
                        <span>CREATOR<span class="outline">CHAIN</span></span>
                    </a>
                    <div class="mono" style="font-size:12px; color:#666; font-weight:700;">© 2026 CREATORCHAIN.NETWORK — ALL RIGHTS RESERVED.</div>
                </div>
            `;
            document.body.appendChild(footer);
        }
        renderFooter();

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
