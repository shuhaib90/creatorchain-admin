<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Opportunity | CreatorChain</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --orange: #FF4D00;
            --black: #000000;
            --white: #FFFFFF;
            --font-mono: 'Space Mono', monospace;
        }

        /* ─── Mobile Restriction ─────────────────────────────── */
        (function() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isMobile && !window.location.search.includes('bypass=true')) {
                const overlay = document.createElement('div');
                overlay.style = "position:fixed; inset:0; background:#0a0a0a; z-index:999999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; text-align:center; color:#fff;";
                overlay.innerHTML = `
                    <div style="font-size:60px; margin-bottom:20px;">💻</div>
                    <h1 style="font-size:32px; color:#FF4D00; -webkit-text-stroke:0;">SWITCH TO DESKTOP</h1>
                    <p style="font-family: 'Space Mono', monospace; font-size:14px; margin-top:20px; color:#888; max-width:300px;">CreatorChain submission terminal requires a desktop interface for professional project configuration.</p>
                `;
                document.documentElement.appendChild(overlay);
                document.body.style.display = 'none';
            }
        })();

        body { background: #fafafa; font-family: 'Inter', sans-serif; }
        
        .submit-container { max-width: 800px; margin: 80px auto; padding: 20px; }
        
        .brutal-header {
            background: var(--black);
            color: var(--white);
            padding: 40px;
            border: 4px solid var(--black);
            box-shadow: 15px 15px 0 var(--orange);
            margin-bottom: 50px;
        }
        .brutal-header h1 { font-size: 48px; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: -2px; }
        .brutal-header p { font-family: var(--font-mono); font-size: 14px; opacity: 0.8; margin-top: 10px; }

        .brutal-card {
            background: var(--white);
            border: 4px solid var(--black);
            padding: 40px;
            box-shadow: 15px 15px 0 var(--black);
        }

        .form-group { margin-bottom: 30px; }
        .form-label { display: block; font-weight: 900; text-transform: uppercase; font-size: 13px; margin-bottom: 10px; color: var(--black); letter-spacing: 1px; }
        
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 15px;
            border: 3px solid var(--black);
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            background: #fff;
            transition: 0.1s;
            outline: none;
        }
        .form-input:focus, .form-textarea:focus { box-shadow: 6px 6px 0 var(--black); transform: translate(-2px, -2px); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .submit-btn {
            background: var(--orange);
            color: white;
            border: 4px solid var(--black);
            padding: 20px 40px;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            box-shadow: 8px 8px 0 var(--black);
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .submit-btn:hover { transform: translate(-2px, -2px); box-shadow: 10px 10px 0 var(--black); }
        .submit-btn:active { transform: translate(2px, 2px); box-shadow: 4px 4px 0 var(--black); }

        #success-msg {
            display: none;
            background: #00E676;
            color: #000;
            padding: 30px;
            border: 4px solid #000;
            box-shadow: 10px 10px 0 #000;
            text-align: center;
            margin-bottom: 40px;
        }
        #success-msg h2 { margin: 0; font-weight: 900; text-transform: uppercase; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .brutal-header h1 { font-size: 32px; }
        }
    </style>
</head>
<body>
    <nav style="background:var(--white); border-bottom:4px solid var(--black); padding:15px 0; position:sticky; top:0; z-index:1000;">
        <div style="max-width:1100px; margin:0 auto; padding:0 20px; display:flex; justify-content:space-between; align-items:center;">
            <a href="/" style="text-decoration:none; display:flex; align-items:center; gap:10px;">
                <img src="/logo.png" alt="Logo" style="height:44px;">
                <span style="font-weight:900; font-size:20px; color:var(--black); font-family:var(--font-mono);">CREATOR<span style="-webkit-text-stroke: 1px var(--black); color:transparent;">CHAIN</span></span>
            </a>
            <div style="display:flex; gap:20px;">
                <a href="/" style="font-family:var(--font-mono); font-weight:700; font-size:12px; color:var(--black); text-decoration:none;">HOME</a>
                <a href="/launch-opportunities.html" style="font-family:var(--font-mono); font-weight:700; font-size:12px; color:var(--black); text-decoration:none;">FOR TEAMS</a>
            </div>
        </div>
    </nav>
    <div class="submit-container">
        <div id="success-msg">
            <h2>Submission Received!</h2>
            <p>Our admin will review your opportunity and make it live soon.</p>
            <a href="index.html" style="font-weight:900; text-decoration:underline; color:#000; margin-top:15px; display:inline-block;">RETURN HOME</a>
        </div>

        <div class="brutal-header">
            <h1>Pitch Your Project</h1>
            <p>// ATTRACT TOP BUILDERS TO YOUR ECOSYSTEM</p>
        </div>

        <form id="opportunity-form" class="brutal-card">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Project Name</label>
                    <input type="text" id="project_name" class="form-input" placeholder="e.g. CreatorChain" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Opportunity Title</label>
                    <input type="text" id="title" class="form-input" placeholder="e.g. Senior Smart Contract Auditor" required>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group" style="position:relative;">
                    <label class="form-label">Project Logo</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="logo_url" class="form-input" placeholder="https://... or Upload" style="flex:1;">
                        <input type="file" id="logo_file" accept="image/*" style="display:none;" onchange="document.getElementById('logo_url').value = this.files[0] ? 'File: ' + this.files[0].name : '';">
                        <button type="button" class="form-input" onclick="document.getElementById('logo_file').click()" style="width:auto; padding:0 20px; background:#000; color:#fff; cursor:pointer;"><i data-lucide="upload" style="width:16px; height:16px;"></i></button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Project Image / Banner</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="banner_url" class="form-input" placeholder="https://... or Upload" style="flex:1;">
                        <input type="file" id="banner_file" accept="image/*" style="display:none;" onchange="document.getElementById('banner_url').value = this.files[0] ? 'File: ' + this.files[0].name : '';">
                        <button type="button" class="form-input" onclick="document.getElementById('banner_file').click()" style="width:auto; padding:0 20px; background:#000; color:#fff; cursor:pointer;"><i data-lucide="upload" style="width:16px; height:16px;"></i></button>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Type of Opportunity</label>
                <select id="type" class="form-select" required>
                    <option value="developer_bounty">Developer Bounty</option>
                    <option value="content_bounty">Content Bounty</option>
                    <option value="ambassador">Ambassador Role</option>
                    <option value="full_time">Full-time Role</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Detailed Description <span class="req">*</span></label>
                <textarea id="description" class="form-textarea" rows="4" placeholder="Describe the opportunity..."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Mission (Optional)</label>
                <textarea id="mission" class="form-textarea" rows="2" placeholder="What is the core goal of this opportunity?"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">About Project (Optional)</label>
                <textarea id="about_project" class="form-textarea" rows="3" placeholder="Brief background about your project..."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Scope & Requirements (Optional)</label>
                <textarea id="scope_requirements" class="form-textarea" rows="4" placeholder="List specific tasks, eligibility criteria, and submission requirements..."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Required Skills</label>
                <input type="text" id="skills" class="form-input" placeholder="Solidity, Rust, Video Editing, etc (comma separated)">
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Total Reward (Optional)</label>
                    <input type="text" id="reward" class="form-input" placeholder="e.g. $500 / 1000 STRK">
                </div>
                <div class="form-group">
                    <label class="form-label">Deadline (Optional)</label>
                    <input type="date" id="deadline" class="form-input">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Reward Breakdown</label>
                <p style="font-size:11px; color:var(--orange); font-family:var(--font-mono); margin-bottom:10px;">// SELECT HOW MANY TIERS YOU NEED AND DEFINE REWARDS</p>
                <div style="margin-bottom: 15px;">
                    <select id="tier_count" class="form-select" onchange="renderTiers(this.value)" style="max-width: 200px;">
                        <option value="1">1 Tier</option>
                        <option value="2">2 Tiers</option>
                        <option value="3" selected>3 Tiers</option>
                        <option value="4">4 Tiers</option>
                        <option value="5">5 Tiers</option>
                    </select>
                </div>
                <div id="tiers_container" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:10px;">
                    <input type="text" id="prize_1" class="form-input" placeholder="1st Place Reward">
                    <input type="text" id="prize_2" class="form-input" placeholder="2nd Place Reward">
                    <input type="text" id="prize_3" class="form-input" placeholder="3rd Place Reward">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">External / Portfolio Link</label>
                <input type="url" id="external_link" class="form-input" placeholder="https://docs.yourproject.com">
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Project X (Twitter) URL</label>
                    <input type="url" id="twitter_url" class="form-input" placeholder="https://x.com/yourproject" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Specific Post Link (Optional)</label>
                    <input type="url" id="post_link" class="form-input" placeholder="https://x.com/yourproject/status/...">
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Contact Email <span class="req">*</span></label>
                    <input type="email" id="submitter_email" class="form-input" placeholder="For status updates" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Telegram Username (Optional)</label>
                    <input type="text" id="submitter_telegram" class="form-input" placeholder="@username">
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                <i data-lucide="send"></i>
                SUBMIT FOR REVIEW
            </button>
        </form>
    </div>

    <script type="module">
        // Supabase configuration from main site
        const SUPABASE_URL = 'https://mwefmtmcljdsptcgowmb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_SdGsB-hhvxF2-rq_fBiM0A_y3_mQn2n';

        document.getElementById('opportunity-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
            const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = 'SUBMITTING...';

            try {
                // File Upload Logic
                const uploadFile = async (inputId, fileId, bucket) => {
                    const fileInput = document.getElementById(fileId);
                    const urlInput = document.getElementById(inputId);
                    if (fileInput.files && fileInput.files.length > 0) {
                        const file = fileInput.files[0];
                        const fileExt = file.name.split('.').pop();
                        const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                        const { data, error } = await supabase.storage.from(bucket).upload(`public/${fileName}`, file);
                        if (error) throw error;
                        const { data: urlData } = supabase.storage.from(bucket).getPublicUrl(`public/${fileName}`);
                        return urlData.publicUrl;
                    }
                    return urlInput.value.trim();
                };

                const logoUrl = await uploadFile('logo_url', 'logo_file', 'logos');
                const bannerUrl = await uploadFile('banner_url', 'banner_file', 'banners');

                const formData = {
                    project_name: document.getElementById('project_name').value,
                    title: document.getElementById('title').value,
                    type: document.getElementById('type').value,
                    description: document.getElementById('description').value,
                    mission: document.getElementById('mission').value,
                    about_project: document.getElementById('about_project').value,
                    scope_requirements: document.getElementById('scope_requirements').value,
                    logo: logoUrl,
                    share_image: bannerUrl,
                    prize_breakdown: {
                        first: document.getElementById('prize_1')?.value || '',
                        second: document.getElementById('prize_2')?.value || '',
                        third: document.getElementById('prize_3')?.value || '',
                        fourth: document.getElementById('prize_4')?.value || '',
                        fifth: document.getElementById('prize_5')?.value || ''
                    },
                    skills: document.getElementById('skills').value,
                    reward: document.getElementById('reward').value,
                    deadline: document.getElementById('deadline').value || null,
                    external_link: document.getElementById('external_link').value,
                    twitter_url: document.getElementById('twitter_url').value,
                    post_link: document.getElementById('post_link').value,
                    submitter_email: document.getElementById('submitter_email').value,
                    team_contact: document.getElementById('submitter_telegram').value || '',
                    status: 'pending',
                    created_at: new Date().toISOString()
                };

                const { data, error } = await supabase
                    .from('opportunities')
                    .insert([formData]);

                if (error) throw error;

                // Notify Admin via Email and Telegram
                try {
                    fetch('/api/send-email', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            type: 'admin_alert',
                            payload: {
                                project_name: formData.project_name,
                                submitted_by: formData.submitter_email,
                                submitter_email: formData.submitter_email,
                                submitter_telegram: formData.team_contact,
                                category: formData.type
                            }
                        })
                    });
                    
                    fetch('/api/send-telegram', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            type: 'admin_alert',
                            payload: {
                                project_name: formData.project_name,
                                submitted_by: formData.submitter_email,
                                category: formData.type,
                                chat_ids: '2127320399' // Verified admin chat_id
                            }
                        })
                    });
                } catch (notifyErr) { console.warn('Admin alert failed:', notifyErr); }

                document.getElementById('opportunity-form').style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
                window.scrollTo(0,0);
            } catch (err) {
                alert('Error submitting: ' + err.message);
                btn.disabled = false;
                btn.innerHTML = 'SUBMIT FOR REVIEW';
            }
        });
        
        window.renderTiers = (count) => {
            const container = document.getElementById('tiers_container');
            container.innerHTML = '';
            for (let i = 1; i <= parseInt(count); i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.id = `prize_${i}`;
                input.className = 'form-input';
                input.placeholder = i === 1 ? '1st Place Reward' : i === 2 ? '2nd Place Reward' : i === 3 ? '3rd Place Reward' : `${i}th Place Reward`;
                container.appendChild(input);
            }
        };

        lucide.createIcons();
    </script>
</body>
</html>
