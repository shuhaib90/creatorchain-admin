<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | CreatorChain Network</title>

    <!-- Social Sharing Meta Tags -->
    <meta property="og:title" content="CreatorChain Global Leaderboard">
    <meta property="og:description" content="View the top-performing builders and creators in the Web3 ecosystem.">
    <meta property="og:image" content="/social-preview.png">
    <meta property="og:url" content="https://creatorchain.site/leaderboard">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CreatorChain Global Leaderboard">
    <meta name="twitter:description" content="View the top-performing builders and creators in the Web3 ecosystem.">
    <meta name="twitter:image" content="/social-preview.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f5a0;
            --secondary: #fff1a0;
            --accent: #FF4D00;
            --black: #000000;
            --white: #ffffff;
            --gray: #f9f9f9;
            --border: 4px solid #000000;
            --shadow: 8px 8px 0px #000000;
            --font-mono: 'Space Mono', monospace;
            --font-main: 'Outfit', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
        body { 
            background: #fff; 
            color: var(--black); 
            font-family: var(--font-main); 
            overflow-x: hidden;
            background-image: radial-gradient(var(--black) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        header { 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: var(--border);
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 24px; text-transform: uppercase; color: var(--black); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .logo-box { background: var(--black); color: var(--primary); padding: 4px 8px; }

        .container { max-width: 1000px; margin: 0 auto; padding: 60px 5%; }

        .hero { margin-bottom: 60px; text-align: center; }
        .hero-title { font-size: 80px; line-height: 0.9; text-transform: uppercase; margin-bottom: 20px; letter-spacing: -3px; }
        .hero-tag { background: var(--black); color: var(--primary); display: inline-block; padding: 5px 20px; font-weight: 900; font-family: var(--font-mono); font-size: 14px; transform: rotate(-1deg); }

        /* LEADERBOARD LIST */
        .leaderboard-list { display: flex; flex-direction: column; gap: 20px; }
        
        .user-card {
            display: grid;
            grid-template-columns: 60px 80px 1fr 180px;
            align-items: center;
            background: #fff;
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 20px 30px;
            transition: 0.1s;
        }
        .user-card:hover { transform: translate(-4px, -4px); box-shadow: 12px 12px 0 #000; }

        .u-rank { font-family: var(--font-mono); font-weight: 900; font-size: 32px; color: var(--black); opacity: 0.5; }
        .u-rank-active { opacity: 1 !important; color: var(--accent) !important; }

        .stat-row { display: flex; gap: 12px; justify-content: flex-end; }
        .stat-box { display: flex; flex-direction: column; align-items: flex-end; padding: 0 10px; border-right: 2px solid #eee; }
        .stat-box:last-child { border-right: none; padding-right: 0; }
        .stat-val { font-family: var(--font-mono); font-weight: 900; font-size: 18px; line-height: 1; color: var(--black); }
        .stat-lbl { font-size: 8px; font-weight: 900; color: #888; text-transform: uppercase; margin-top: 4px; letter-spacing: 0.5px; }

        /* USER DROPDOWN */
        .user-dropdown-container { position: relative; }
        .user-dropdown-trigger { background: none; border: none; padding: 0; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .user-dropdown-trigger img { width: 48px; height: 48px; border: 2px solid var(--black); object-fit: cover; }
        .user-dropdown-menu { 
            position: absolute; top: 100%; right: 0; margin-top: 10px; 
            background: #fff; border: 3px solid var(--black); box-shadow: 6px 6px 0 var(--black); 
            min-width: 200px; display: none; flex-direction: column; z-index: 10005; padding: 5px; 
        }
        .user-dropdown-menu.show { display: flex; }
        .user-dropdown-menu a { 
            padding: 12px 16px; text-decoration: none; color: var(--black); 
            font-size: 11px; font-weight: 900; font-family: var(--font-mono); 
            transition: 0.1s; display: flex; align-items: center; gap: 10px;
            border-bottom: 2px solid #eee; 
        }
        .user-dropdown-menu a:last-child { border-bottom: none; }
        .user-dropdown-menu a:hover { background: var(--primary); color: #000; }
        .u-pic { width: 60px; height: 60px; border: var(--border); background: #eee; cursor: pointer; transition: 0.1s; position: relative; }
        .u-pic:hover { transform: scale(1.1) rotate(2deg); z-index: 2; }
        .u-pic img { width: 100%; height: 100%; object-fit: cover; border: 1px solid #000; }

        .u-info h3 { font-size: 22px; text-transform: uppercase; line-height: 1; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .u-handle { font-family: var(--font-mono); font-size: 11px; color: #888; display: flex; align-items: center; gap: 10px; font-weight: 700; }
        .u-loc { color: var(--black); font-weight: 900; opacity: 1; font-size: 10px; text-transform: uppercase; background: #f0f0f0; padding: 2px 6px; border: 1px solid #000; }

        .u-points { text-align: right; }
        .p-val { font-family: var(--font-mono); font-weight: 900; font-size: 28px; line-height: 1; color: var(--black); }
        .p-lbl { font-size: 9px; font-weight: 900; color: #888; text-transform: uppercase; margin-top: 5px; letter-spacing: 1px; }

        .badge-pro { background: var(--primary); color: #000; padding: 2px 8px; font-size: 9px; font-weight: 900; border: 2px solid #000; font-family: var(--font-mono); vertical-align: middle; }
        .badge-verified { border: 2px solid #000; padding: 2px 8px; font-size: 9px; font-weight: 900; font-family: var(--font-mono); vertical-align: middle; }

        /* PAGINATION */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 60px; flex-wrap: wrap; }
        .pag-btn {
            background: #fff;
            border: 3px solid #000;
            padding: 10px 20px;
            font-family: var(--font-mono);
            font-weight: 900;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 4px 4px 0 #000;
            transition: 0.1s;
        }
        .pag-btn:hover:not(.active):not(:disabled) { background: var(--primary); transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #000; }
        .pag-btn.active { background: var(--black); color: var(--primary); box-shadow: none; transform: translate(4px, 4px); }
        .pag-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* MODAL (SYNCHRONIZED WITH TALENT.HTML) */
        #profile-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            z-index: 100000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .p-card { 
            background: #fff; 
            border: 4px solid var(--black); 
            box-shadow: 20px 20px 0 rgba(0,0,0,0.15); 
            width: 100%; 
            max-width: 950px; 
            height: 620px;
            position: relative; 
            overflow: hidden; 
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .p-card-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 32px;
            height: 32px;
            background: var(--black);
            color: #fff;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            font-size: 14px;
            font-weight: 900;
            transition: 0.1s;
        }
        .p-card-close:hover { background: var(--accent); color: #000; }
        
        .p-card-grid { display: grid; grid-template-columns: 0.4fr 0.6fr; width: 100%; height: 100%; }
        .p-card-left { padding: 40px; border-right: 4px solid var(--black); background: #fafafa; display: flex; flex-direction: column; overflow-y: auto; }
        .p-card-right { padding: 40px; background: #fff; display: flex; flex-direction: column; gap: 32px; overflow-y: auto; }

        .p-card-avatar { width: 120px; height: 120px; border: 4px solid #000; box-shadow: 8px 8px 0 #000; object-fit: cover; background: #eee; margin-bottom: 24px; }
        
        .p-card-info h2 { font-size: 24px; font-weight: 900; text-transform: uppercase; line-height: 1.2; margin-bottom: 4px; display: flex; align-items: center; flex-wrap: wrap; }
        .p-card-handle { font-family: var(--font-mono); font-size: 13px; color: #888; font-weight: 700; margin-bottom: 20px; }
        
        .p-card-bio { font-size: 14px; line-height: 1.6; margin-bottom: 24px; font-weight: 500; color: #111; }
        .p-card-bio.placeholder { color: #aaa; font-style: italic; }

        .p-card-label { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #CCCCCC; margin-bottom: 8px; letter-spacing: 1px; font-family: var(--font-mono); display: block; }
        
        .p-card-socials { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .p-card-social-btn { 
            width: 40px; height: 40px; border: 2px solid var(--black); 
            display: flex; align-items: center; justify-content: center; 
            background: #fff; color: #000; transition: 0.1s; 
            box-shadow: 3px 3px 0 var(--black); text-decoration: none;
        }
        .p-card-social-btn:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--black); background: var(--primary); }

        /* STATS GRID */
        .p-stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .p-stat-card { border: 2px solid var(--black); padding: 16px; background: #fff; }
        .p-stat-val { font-family: var(--font-mono); font-size: 22px; font-weight: 900; color: #000; display: block; }
        .p-stat-val.score { color: #00E676; }

        /* SKILLS */
        .p-skills-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
        .p-skill-tag { border: 2px solid var(--black); padding: 6px 12px; font-size: 12px; font-weight: 900; font-family: var(--font-mono); background: #fff; }

        /* WORK CONTEXT GRID */
        .p-work-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .p-work-card { border: 2px solid #f0f0f0; padding: 16px; display: flex; align-items: center; gap: 12px; }
        .p-work-icon { width: 32px; height: 32px; border: 2px solid var(--black); display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: #fff; }
        .p-work-info { display: flex; flex-direction: column; }
        .p-work-val { font-size: 13px; font-weight: 900; color: #111; text-transform: uppercase; }

        .verification-badge { display: inline-flex; align-items: center; vertical-align: middle; cursor: help; }
        .verification-badge svg { width: 16px; height: 16px; }
        .verification-badge.medium svg { width: 24px; height: 24px; }

        .p-card-primary-btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 16px;
            font-family: var(--font-mono);
            font-weight: 900;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: auto;
            transition: 0.1s;
        }
        .p-card-primary-btn:hover { background: var(--primary); color: #000; transform: translate(-2px, -2px); box-shadow: 4px 4px 0 #000; }



        .p-card-skills { display: flex; flex-wrap: wrap; gap: 8px; }
        .p-card-skill-tag { border: 2px solid #000; padding: 4px 10px; font-size: 11px; font-weight: 900; font-family: var(--font-mono); background: #fff; text-transform: uppercase; }

        .p-card-meta-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .p-card-meta-card { border: 2px solid #eee; padding: 12px; display: flex; align-items: center; gap: 12px; background: #fff; }
        .p-card-meta-icon { width: 32px; height: 32px; border: 2px solid #000; display: flex; align-items: center; justify-content: center; background: #f0f0f0; }
        .p-card-meta-label { font-size: 9px; font-weight: 900; color: #888; text-transform: uppercase; }
        .p-card-meta-value { font-size: 12px; font-weight: 900; text-transform: uppercase; }

        .p-card-primary-btn {
            background: var(--black);
            color: var(--primary);
            border: 3px solid var(--black);
            padding: 15px;
            width: 100%;
            font-weight: 900;
            font-family: var(--font-main);
            text-transform: uppercase;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 6px 6px 0 var(--primary);
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .p-card-primary-btn:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0 var(--primary); }

        .is-pro-card { border-color: var(--primary); }
        .is-pro-card .p-card-left { background: #f6fffb; }

        @media (max-width: 850px) {
            .p-card-grid { grid-template-columns: 1fr; }
            .p-card-left { border-right: none; border-bottom: 4px solid var(--black); }
            .p-card { max-width: 500px; max-height: 85vh; overflow-y: auto; }
            .hero-title { font-size: 48px; }
            .user-card { grid-template-columns: 40px 60px 1fr; gap: 15px; padding: 15px; }
            .u-points { grid-column: span 3; text-align: left; padding-top: 15px; border-top: 2px solid #eee; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo"><span class="logo-box">CC</span> CREATORCHAIN</a>
        <nav style="display:flex; gap:25px; align-items:center;">
            <a href="index.html" style="text-decoration:none; color:#000; font-family:var(--font-mono); font-weight:700; font-size:12px;">HOME</a>
            <div id="auth-nav-box"></div>
        </nav>
    </header>

    <div class="container">
        <section class="hero">
            <h1 class="hero-title">COMMUNITY<br>LEADERBOARD</h1>
            <div class="hero-tag">OUR TOP CONTRIBUTORS</div>
        </section>

        <div id="leaderboard-root" class="leaderboard-list">
            <div style="text-align: center; padding: 100px; font-family: var(--font-mono); font-weight: 900; letter-spacing: 2px;">SYNCHRONIZING DATA...</div>
        </div>

        <div id="pagination-root" class="pagination"></div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" onclick="closeModal()">
        <div id="modal-body" onclick="event.stopPropagation()"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mwefmtmcljdsptcgowmb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13ZWZtdG1jbGpkc3B0Y2dvd21iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDM1MTIsImV4cCI6MjA5MDM3OTUxMn0.MWkosFtcKB5UAQGvNTB6fABEIMfkgzXgnwb_17pJabU';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let fullData = [];
        let currentPage = 1;
        const perPage = 10;

        async function init() {
            checkUser();
            await loadData();
        }

        async function checkUser() {
            try {
                const { data: { user } } = await db.auth.getUser();
                if (user) {
                    const h = (user.user_metadata?.user_name || '').replace('@','');
                    const { data: profile } = await db.from('user_profiles')
                        .select('*')
                        .or(`username.eq.${h},twitter.ilike.%${h}%`)
                        .maybeSingle();
                    
                    const metadata = user.user_metadata;
                    
                    // Robust Avatar Logic: Priority 1: profile, Priority 2: metadata, Priority 3: fallback
                    let pic = profile?.avatar_url || metadata.avatar_url || metadata.picture;
                    if (!pic) {
                        pic = `https://unavatar.io/twitter/${profile?.username || metadata.user_name || 'user'}`;
                    }
                    
                    document.getElementById('auth-nav-box').innerHTML = `
                        <div class="user-dropdown-container">
                            <button class="user-dropdown-trigger" onclick="toggleUserDropdown()">
                                <img src="${pic}" onerror="this.src='https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png'">
                            </button>
                            <div id="user-menu" class="user-dropdown-menu">
                                <a href="index.html?profile=true"><i data-lucide="edit-3" style="width:14px; height:14px;"></i> EDIT PROFILE</a>
                                <a href="#" onclick="signOut()"><i data-lucide="log-out" style="width:14px; height:14px; color: #ef4444;"></i> LOGOUT</a>
                            </div>
                        </div>
                    `;
                    lucide.createIcons();
                } else {
                    document.getElementById('auth-nav-box').innerHTML = `<a href="index.html" style="font-weight:900; font-family:var(--font-mono); font-size:11px; color:#000; text-decoration:none; border:2px solid #000; padding:6px 12px; background:var(--primary); box-shadow:4px 4px 0 #000;">LOGIN</a>`;
                }
            } catch (e) {
                console.error('Check User Error:', e);
            }
        }

        async function signOut() {
            await db.auth.signOut();
            window.location.reload();
        }

        function toggleUserDropdown() {
            const menu = document.getElementById('user-menu');
            menu.classList.toggle('show');
        }

        window.onclick = function(event) {
            if (!event.target.closest('.user-dropdown-container')) {
                const menus = document.getElementsByClassName('user-dropdown-menu');
                for (let i = 0; i < menus.length; i++) {
                    menus[i].classList.remove('show');
                }
            }
        }

        function getBadgeHtml(profile, size = 'small') {
            if (!profile) return '';
            const isVerified = profile.is_verified === true;
            const isPro = profile.badge_level === 'pro' || (profile.approved_submissions || 0) > 5;

            let badgeType = null;
            let tooltip = '';

            if (isPro) {
                badgeType = 'pro';
                tooltip = 'PRO BUILDER';
            } else if (isVerified) {
                badgeType = 'verified';
                tooltip = 'VERIFIED IDENTITY';
            }

            if (!badgeType) return '';

            const sizeClass = size === 'medium' ? 'medium' : '';
            const color = badgeType === 'pro' ? '#FFD600' : '#00E676';
            const checkColor = badgeType === 'pro' ? '#000' : '#fff';

            return `
                <span class="verification-badge ${sizeClass}" title="${tooltip}">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="11" fill="${color}"/>
                        <path d="M17.33 8.33L10 15.67L6.67 12.33" stroke="${checkColor}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
            `;
        }

        async function loadData() {
            const root = document.getElementById('leaderboard-root');
            try {
                const { data: profiles, error: pErr } = await db.from('user_profiles')
                    .select('*')
                    .limit(1000);

                if (pErr) throw pErr;

                // Sort by approved_submissions desc, then reputation_score desc
                profiles.sort((a, b) => {
                    const aDiff = (b.approved_submissions || 0) - (a.approved_submissions || 0);
                    if (aDiff !== 0) return aDiff;
                    return (b.reputation_score || b.score || 0) - (a.reputation_score || a.score || 0);
                });

                // Show users who have any activity: approved_submissions > 0 OR reputation_score > 0 OR total_submissions > 0
                const activeProfiles = profiles.filter(p => 
                    (p.approved_submissions || 0) > 0 || 
                    (p.reputation_score || 0) > 0 || 
                    (p.total_submissions || 0) > 0
                );

                fullData = activeProfiles.map(p => {
                    const h = p.username || p.twitter?.replace('@','') || 'builder';
                    
                    // Robust Avatar Logic from talent.html
                    let avatar = p.avatar_url;
                    if (!avatar) {
                        avatar = `https://unavatar.io/${h}`;
                    }
                    
                    const approved = p.approved_submissions || 0;
                    const total = p.total_submissions || approved || 1;
                    const successRate = total > 0 ? Math.round((approved / total) * 100) : 0;

                    return {
                        handle: h,
                        name: p.name || h,
                        avatar: avatar,
                        count: approved,
                        total: total,
                        success: successRate,
                        score: p.reputation_score || p.score || 0,
                        is_verified: p.is_verified || false,
                        badge: p.badge_level || '',
                        location: p.location || 'GLOBAL',
                        profile: p
                    };
                });

                if (fullData.length === 0) {
                    root.innerHTML = '<div style="text-align: center; padding: 100px; font-family: var(--font-mono);">NO DATA DISCOVERED IN THE NETWORK.</div>';
                    return;
                }

                render();
            } catch (err) { 
                console.error("Leaderboard Error:", err);
                root.innerHTML = `<div style="text-align: center; padding: 100px; font-family: var(--font-mono); color:red;">DATA SYNC FAILED: ${err.message.toUpperCase()}</div>`;
            }
        }

        function render() {
            const root = document.getElementById('leaderboard-root');
            const pag = document.getElementById('pagination-root');
            root.innerHTML = '';
            pag.innerHTML = '';

            const start = (currentPage - 1) * perPage;
            const pageData = fullData.slice(start, start + perPage);

            pageData.forEach((u, i) => {
                const rank = start + i + 1;
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `
                    <div class="u-rank ${rank <= 3 ? 'u-rank-active' : ''}">#${rank.toString().padStart(2, '0')}</div>
                    <div class="u-pic" onclick="openPublicProfile('${u.handle}')">
                        <img src="${u.avatar}" onerror="this.src='https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png'">
                    </div>
                    <div class="u-info">
                        <h3 onclick="openPublicProfile('${u.handle}')" style="cursor:pointer;">
                            ${u.name.toUpperCase()} ${getBadgeHtml(u.profile)}
                        </h3>
                        <div class="u-handle">
                            @${u.handle.toLowerCase()} 
                            ${u.location ? `<span class="u-loc"><i data-lucide="map-pin" style="width:10px; height:10px; vertical-align:middle; margin-right:4px;"></i> ${u.location}</span>` : ''}
                        </div>
                    </div>
                    <div class="u-points">
                        <div class="stat-row">
                            <div class="stat-box">
                                <span class="stat-val">${u.count}</span>
                                <span class="stat-lbl">OPS</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-val">${u.success}%</span>
                                <span class="stat-lbl">SUCCESS</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-val">${u.location.substring(0,6).toUpperCase()}</span>
                                <span class="stat-lbl">SECTOR</span>
                            </div>
                        </div>
                    </div>
                `;
                root.appendChild(card);
            });

            const total = Math.ceil(fullData.length / perPage);
            if (total > 1) {
                const prev = document.createElement('button');
                prev.className = 'pag-btn';
                prev.innerText = 'PREV';
                prev.disabled = currentPage === 1;
                prev.onclick = () => { currentPage--; render(); window.scrollTo({top: 400, behavior: 'smooth'}); };
                pag.appendChild(prev);

                for(let i=1; i<=total; i++) {
                    if (total > 8 && i > 3 && i < total - 2 && (i < currentPage - 1 || i > currentPage + 1)) {
                        if (i === 4 || i === total - 3) {
                            const d = document.createElement('span'); d.innerText = '...'; d.style.fontWeight='900'; pag.appendChild(d);
                        }
                        continue;
                    }
                    const btn = document.createElement('button');
                    btn.className = `pag-btn ${i === currentPage ? 'active' : ''}`;
                    btn.innerText = i;
                    btn.onclick = () => { currentPage = i; render(); window.scrollTo({top: 400, behavior: 'smooth'}); };
                    pag.appendChild(btn);
                }

                const next = document.createElement('button');
                next.className = 'pag-btn';
                next.innerText = 'NEXT';
                next.disabled = currentPage === total;
                next.onclick = () => { currentPage++; render(); window.scrollTo({top: 400, behavior: 'smooth'}); };
                pag.appendChild(next);
            }

            lucide.createIcons();
        }

        function openPublicProfile(handle) {
            if (!handle) return;
            const cleanHandle = handle.replace('@', '').trim();
            // Use extension-less path to avoid Vercel query-stripping redirects
            window.location.href = `/profile?u=${cleanHandle}`;
        }
        
        function closeModal() { document.getElementById('profile-modal').style.display = 'none'; }
        
        function shareProfile(handle) {
            const url = `${window.location.origin}/profile?u=${handle}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('LINK COPIED! OPTIMIZED FOR X SHARING 🚀');
            });
        }

        init();
    </script>
</body>
</html>
