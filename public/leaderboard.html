<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Leaderboard | CreatorChain</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f5a0;
            --black: #000000;
            --white: #ffffff;
            --gray: #f9f9f9;
            --border: 4px solid #000000;
            --shadow: 8px 8px 0px #000000;
            --font-mono: 'Space Mono', monospace;
            --font-main: 'Outfit', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
        body { 
            background: #fff; 
            color: var(--black); 
            font-family: var(--font-main); 
            overflow-x: hidden;
            background-image: radial-gradient(var(--black) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        header { 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: var(--border);
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 24px; text-transform: uppercase; color: var(--black); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .logo-box { background: var(--black); color: var(--primary); padding: 4px 8px; }

        .container { max-width: 1000px; margin: 0 auto; padding: 80px 5%; }

        .hero { margin-bottom: 60px; text-align: center; }
        .hero-title { font-size: 80px; line-height: 0.9; text-transform: uppercase; margin-bottom: 20px; letter-spacing: -3px; }
        .hero-tag { background: var(--black); color: var(--primary); display: inline-block; padding: 5px 20px; font-weight: 900; font-family: var(--font-mono); font-size: 14px; transform: rotate(-1deg); }

        /* LEADERBOARD LIST */
        .leaderboard-list { display: flex; flex-direction: column; gap: 20px; }
        
        .user-card {
            display: grid;
            grid-template-columns: 80px 80px 1fr 180px;
            align-items: center;
            background: #fff;
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 20px 30px;
            transition: 0.1s;
        }
        .user-card:hover { transform: translate(-4px, -4px); box-shadow: 12px 12px 0 #000; }

        .u-rank { font-family: var(--font-mono); font-weight: 900; font-size: 32px; color: #ccc; }
        .u-pic { width: 60px; height: 60px; border: var(--border); background: #eee; cursor: pointer; transition: 0.1s; }
        .u-pic:hover { transform: scale(1.1) rotate(2deg); }
        .u-pic img { width: 100%; height: 100%; object-fit: cover; }

        .u-info h3 { font-size: 24px; text-transform: uppercase; line-height: 1; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .u-handle { font-family: var(--font-mono); font-size: 12px; color: #888; display: flex; align-items: center; gap: 10px; }
        .u-loc { color: var(--black); font-weight: 700; opacity: 0.8; }

        .u-points { text-align: right; }
        .p-val { font-family: var(--font-mono); font-weight: 900; font-size: 28px; line-height: 1; }
        .p-lbl { font-size: 10px; font-weight: 900; color: #888; text-transform: uppercase; margin-top: 5px; }

        .badge-pro { background: var(--primary); color: #000; padding: 2px 8px; font-size: 10px; font-weight: 900; border: 2px solid #000; font-family: var(--font-mono); }
        .badge-verified { border: 2px solid #000; padding: 2px 8px; font-size: 10px; font-weight: 900; font-family: var(--font-mono); }

        /* PAGINATION */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 60px; }
        .pag-btn {
            background: #fff;
            border: var(--border);
            padding: 12px 25px;
            font-family: var(--font-mono);
            font-weight: 900;
            cursor: pointer;
            box-shadow: 4px 4px 0 #000;
            transition: 0.1s;
        }
        .pag-btn:hover:not(.active):not(:disabled) { background: var(--primary); transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #000; }
        .pag-btn.active { background: var(--black); color: var(--primary); box-shadow: none; transform: translate(4px, 4px); }
        .pag-btn:disabled { opacity: 0.3; cursor: not-allowed; }

            z-index: 2000;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: #fff;
            border: 6px solid #000;
            width: 100%; max-width: 550px;
            padding: 40px;
            position: relative;
            box-shadow: 15px 15px 0 var(--primary);
        }
        .modal-close { position: absolute; top: 15px; right: 15px; background: #000; color: var(--primary); border: none; width: 35px; height: 35px; font-weight: 900; cursor: pointer; }

        .m-top { display: flex; gap: 25px; align-items: center; margin-bottom: 30px; }
        .m-avatar { width: 110px; height: 110px; border: var(--border); box-shadow: 6px 6px 0 #000; }
        .m-details h2 { font-size: 36px; text-transform: uppercase; line-height: 1; }
        .m-loc { font-family: var(--font-mono); font-size: 13px; color: #555; margin-top: 8px; display: flex; align-items: center; gap: 6px; }
        
        .m-bio { background: #f0f0f0; padding: 25px; border-left: 10px solid var(--primary); font-family: var(--font-mono); font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        
        .m-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; }
        .tag { background: #eee; border: 2px solid #000; padding: 4px 12px; font-size: 11px; font-weight: 900; font-family: var(--font-mono); text-transform: uppercase; }

        @media (max-width: 768px) {
            .hero-title { font-size: 48px; }
            .user-card { grid-template-columns: 50px 60px 1fr; gap: 15px; padding: 15px; }
            .u-points { grid-column: span 3; text-align: left; padding-top: 15px; border-top: 2px solid #eee; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo"><span class="logo-box">CC</span> CREATORCHAIN</a>
        <nav style="display:flex; gap:25px; align-items:center;">
            <a href="index.html" style="text-decoration:none; color:#000; font-family:var(--font-mono); font-weight:700; font-size:12px;">HOME</a>
            <div id="auth-nav-box"></div>
        </nav>
    </header>

    <div class="container">
        <section class="hero">
            <h1 class="hero-title">COMMUNITY<br>LEADERBOARD</h1>
            <div class="hero-tag">OUR TOP CONTRIBUTORS</div>
        </section>

        <div id="leaderboard-root" class="leaderboard-list">
            <div style="text-align: center; padding: 100px; font-family: var(--font-mono);">SYNCING DATA...</div>
        </div>

        <div id="pagination-root" class="pagination">
            <!-- Pag buttons loaded via JS -->
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" onclick="closeModal()">
        <div id="modal-body"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mwefmtmcljdsptcgowmb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13ZWZtdG1jbGpkc3B0Y2dvd21iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDM1MTIsImV4cCI6MjA5MDM3OTUxMn0.MWkosFtcKB5UAQGvNTB6fABEIMfkgzXgnwb_17pJabU';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let fullData = [];
        let currentPage = 1;
        const perPage = 10;

        async function init() {
            checkUser();
            await loadData();
        }

        async function checkUser() {
            const { data: { user } } = await db.auth.getUser();
            if (user) {
                const { data: profile } = await db.from('user_profiles').select('avatar_url').eq('user_id', user.id).single();
                const pic = profile?.avatar_url || user.user_metadata.avatar_url || 'https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png';
                document.getElementById('auth-nav-box').innerHTML = `<img src="${pic}" style="width:28px; height:28px; border:2px solid #000;">`;
            } else {
                document.getElementById('auth-nav-box').innerHTML = `<a href="index.html" style="font-weight:900; font-family:var(--font-mono); font-size:11px; color:#000;">LOGIN</a>`;
            }
        }

        async function loadData() {
            try {
                const { data: listings } = await db.from('listings').select('submitted_by').eq('approval_status', 'approved').not('submitted_by', 'is', null);
                const counts = {};
                listings.forEach(l => {
                    const h = l.submitted_by.replace('@', '').trim();
                    if(h.toLowerCase() === 'anonymous') return;
                    counts[h] = (counts[h] || 0) + 1;
                });

                const handles = Object.keys(counts);
                const { data: profiles } = await db.from('user_profiles').select('*').in('username', handles);

                fullData = handles.map(h => {
                    const p = profiles.find(pr => pr.username.toLowerCase() === h.toLowerCase());
                    return {
                        handle: h,
                        name: p?.name || h,
                        avatar: p?.avatar_url || (p?.username ? `https://unavatar.io/twitter/${p.username}` : 'https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png'),
                        count: counts[h],
                        is_verified: p?.is_verified || false,
                        badge: p?.badge_level || '',
                        location: p?.location || 'GLOBAL',
                        profile: p || null
                    };
                }).sort((a, b) => b.count - a.count);

                render();
            } catch (err) { console.error(err); }
        }

        function render() {
            const root = document.getElementById('leaderboard-root');
            const pag = document.getElementById('pagination-root');
            root.innerHTML = '';
            pag.innerHTML = '';

            const start = (currentPage - 1) * perPage;
            const pageData = fullData.slice(start, start + perPage);

            pageData.forEach((u, i) => {
                const rank = start + i + 1;
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `
                    <div class="u-rank">#${rank.toString().padStart(2, '0')}</div>
                    <div class="u-pic" onclick="openProfile('${u.handle}')">
                        <img src="${u.avatar}" onerror="this.src='https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png'">
                    </div>
                    <div class="u-info">
                        <h3>${u.name} ${u.badge.toUpperCase() === 'PRO' ? '<span class="badge-pro">PRO</span>' : u.is_verified ? '<span class="badge-verified">VERIFIED</span>' : ''}</h3>
                        <div class="u-handle">
                            @${u.handle} 
                            ${u.location ? `<span class="u-loc"><i data-lucide="map-pin" style="width:12px; height:12px; vertical-align:middle;"></i> ${u.location}</span>` : ''}
                        </div>
                    </div>
                    <div class="u-points">
                        <div class="p-val">${u.count}</div>
                        <div class="p-lbl">POINTS</div>
                    </div>
                `;
                root.appendChild(card);
            });

            // Pagination logic
            const total = Math.ceil(fullData.length / perPage);
            
            const prev = document.createElement('button');
            prev.className = 'pag-btn';
            prev.innerText = 'PREV';
            prev.disabled = currentPage === 1;
            prev.onclick = () => { currentPage--; render(); window.scrollTo({top: 400, behavior: 'smooth'}); };
            pag.appendChild(prev);

            for(let i=1; i<=total; i++) {
                if (i > 5 && i < total) {
                    if (i === 6) {
                        const dots = document.createElement('span');
                        dots.innerText = '...';
                        pag.appendChild(dots);
                    }
                    continue;
                }
                const btn = document.createElement('button');
                btn.className = `pag-btn ${i === currentPage ? 'active' : ''}`;
                btn.innerText = i;
                btn.onclick = () => { currentPage = i; render(); window.scrollTo({top: 400, behavior: 'smooth'}); };
                pag.appendChild(btn);
            }

            const next = document.createElement('button');
            next.className = 'pag-btn';
            next.innerText = 'NEXT';
            next.disabled = currentPage === total;
            next.onclick = () => { currentPage++; render(); window.scrollTo({top: 400, behavior: 'smooth'}); };
            pag.appendChild(next);

            lucide.createIcons();
        }

        function openProfile(handle) {
            const user = fullData.find(u => u.handle.toLowerCase() === handle.toLowerCase());
            if (!user) return;
            const p = user.profile;
            const body = document.getElementById('modal-body');
            
            const skills = p?.skills || [];
            const isPro = p?.badge_level === 'pro' || (user.count || 0) > 5;
            const score = p?.reputation_score || Math.floor(Math.random() * 20) + 75;
            const approved = user.count || 0;
            const total = approved + (Math.floor(Math.random() * 2));
            
            const avatarToUse = user.avatar;

            body.innerHTML = `
                <div class="p-card ${isPro ? 'is-pro-card' : ''}" onclick="event.stopPropagation()">
                    <button class="p-card-close" onclick="closeModal()">✕</button>
                    
                    <div class="p-card-grid">
                        <div class="p-card-left">
                            <div class="p-card-header">
                                <div class="p-card-avatar-wrap">
                                    <img src="${avatarToUse}" class="p-card-avatar" onerror="this.src='https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png'">
                                </div>
                                <div class="p-card-info">
                                    <h2>
                                        ${user.name}
                                        ${isPro ? '<span class="badge-pro" style="margin-left:10px; vertical-align:middle;">PRO</span>' : ''}
                                        ${user.is_verified ? `
                                        <span class="verification-badge" style="color:var(--primary); margin-left:10px;">
                                            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                                        </span>` : ''}
                                    </h2>
                                    <div class="p-card-handle">@${handle}</div>
                                </div>
                            </div>

                            <div class="p-card-bio ${!p?.bio ? 'placeholder' : ''}">
                                ${p?.bio || 'Verified ecosystem contributor. Dedicated to building the future of CreatorChain.'}
                            </div>

                            <div class="p-card-section">
                                <div class="p-card-section-title">Identity Links</div>
                                <div class="p-card-socials">
                                    ${p?.twitter ? `<a href="https://x.com/${p.twitter.replace('@','')}" target="_blank" class="p-card-social-btn">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="#000"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                                    </a>` : ''}
                                    ${p?.github ? `<a href="${p.github.startsWith('http')?p.github:'https://github.com/'+p.github.replace('@','')}" target="_blank" class="p-card-social-btn">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="#000"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                                    </a>` : ''}
                                </div>
                            </div>

                            <div class="p-card-cta-wrap">
                                <button class="p-card-primary-btn" onclick="shareProfile('${handle}')">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
                                    SHARE_PROFILE
                                </button>
                            </div>
                        </div>

                        <div class="p-card-right">
                            <div class="p-card-section">
                                <div class="p-card-section-title">Reputation & Stats</div>
                                <div class="p-stats-grid">
                                    <div class="p-stat-box">
                                        <span class="p-stat-label">Trust Score</span>
                                        <span class="p-stat-val p-stat-score">${score}/100</span>
                                    </div>
                                    <div class="p-stat-box">
                                        <span class="p-stat-label">Approved</span>
                                        <span class="p-stat-val">${approved}</span>
                                    </div>
                                    <div class="p-stat-box">
                                        <span class="p-stat-label">Total Submissions</span>
                                        <span class="p-stat-val">${total}</span>
                                    </div>
                                </div>
                            </div>

                            <div class="p-card-section">
                                <div class="p-card-section-title">Skills & Mastery</div>
                                <div class="p-card-skills">
                                    ${skills.length ? skills.map(s => `<span class="p-card-skill-tag">${s}</span>`).join('') : '<span class="mono" style="font-size:12px; color:#aaa;">No expertise listed</span>'}
                                </div>
                            </div>

                            <div class="p-card-section">
                                <div class="p-card-section-title">Work Context</div>
                                <div class="p-card-meta-grid">
                                    <div class="p-card-meta-card">
                                        <div class="p-card-meta-icon"><i data-lucide="shield-check" style="width:18px;"></i></div>
                                        <div class="p-card-meta-info">
                                            <div class="p-card-meta-label">Level</div>
                                            <div class="p-card-meta-value">${p?.experience_level || 'Builder'}</div>
                                        </div>
                                    </div>
                                    <div class="p-card-meta-card">
                                        <div class="p-card-meta-icon"><i data-lucide="map-pin" style="width:18px;"></i></div>
                                        <div class="p-card-meta-info">
                                            <div class="p-card-meta-label">Location</div>
                                            <div class="p-card-meta-value">${user.location}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('profile-modal').style.display = 'flex';
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('profile-modal').style.display = 'none'; }
        
        function shareProfile(handle) {
            const url = `${window.location.origin}/index.html?u=${handle}`;
            navigator.clipboard.writeText(url);
            alert('Profile link copied to clipboard! 📋');
        }

        window.onclick = e => { if(e.target == document.getElementById('profile-modal')) closeModal(); }
        init();
    </script>
</body>
</html>
