<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Leaderboard | CreatorChain</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f5a0;
            --secondary: #fff1a0;
            --accent: #FF4D00;
            --black: #000000;
            --white: #ffffff;
            --gray: #f9f9f9;
            --border: 4px solid #000000;
            --shadow: 8px 8px 0px #000000;
            --font-mono: 'Space Mono', monospace;
            --font-main: 'Outfit', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
        body { 
            background: #fff; 
            color: var(--black); 
            font-family: var(--font-main); 
            overflow-x: hidden;
            background-image: radial-gradient(var(--black) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        header { 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: var(--border);
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 24px; text-transform: uppercase; color: var(--black); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .logo-box { background: var(--black); color: var(--primary); padding: 4px 8px; }

        .container { max-width: 1000px; margin: 0 auto; padding: 60px 5%; }

        .hero { margin-bottom: 60px; text-align: center; }
        .hero-title { font-size: 80px; line-height: 0.9; text-transform: uppercase; margin-bottom: 20px; letter-spacing: -3px; }
        .hero-tag { background: var(--black); color: var(--primary); display: inline-block; padding: 5px 20px; font-weight: 900; font-family: var(--font-mono); font-size: 14px; transform: rotate(-1deg); }

        /* LEADERBOARD LIST */
        .leaderboard-list { display: flex; flex-direction: column; gap: 20px; }
        
        .user-card {
            display: grid;
            grid-template-columns: 60px 80px 1fr 180px;
            align-items: center;
            background: #fff;
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 20px 30px;
            transition: 0.1s;
        }
        .user-card:hover { transform: translate(-4px, -4px); box-shadow: 12px 12px 0 #000; }

        .u-rank { font-family: var(--font-mono); font-weight: 900; font-size: 28px; color: #eee; }
        .u-pic { width: 60px; height: 60px; border: var(--border); background: #eee; cursor: pointer; transition: 0.1s; position: relative; }
        .u-pic:hover { transform: scale(1.1) rotate(2deg); z-index: 2; }
        .u-pic img { width: 100%; height: 100%; object-fit: cover; border: 1px solid #000; }

        .u-info h3 { font-size: 22px; text-transform: uppercase; line-height: 1; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .u-handle { font-family: var(--font-mono); font-size: 11px; color: #888; display: flex; align-items: center; gap: 10px; font-weight: 700; }
        .u-loc { color: var(--black); font-weight: 900; opacity: 1; font-size: 10px; text-transform: uppercase; background: #f0f0f0; padding: 2px 6px; border: 1px solid #000; }

        .u-points { text-align: right; }
        .p-val { font-family: var(--font-mono); font-weight: 900; font-size: 28px; line-height: 1; color: var(--black); }
        .p-lbl { font-size: 9px; font-weight: 900; color: #888; text-transform: uppercase; margin-top: 5px; letter-spacing: 1px; }

        .badge-pro { background: var(--primary); color: #000; padding: 2px 8px; font-size: 9px; font-weight: 900; border: 2px solid #000; font-family: var(--font-mono); vertical-align: middle; }
        .badge-verified { border: 2px solid #000; padding: 2px 8px; font-size: 9px; font-weight: 900; font-family: var(--font-mono); vertical-align: middle; }

        /* PAGINATION */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 60px; flex-wrap: wrap; }
        .pag-btn {
            background: #fff;
            border: 3px solid #000;
            padding: 10px 20px;
            font-family: var(--font-mono);
            font-weight: 900;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 4px 4px 0 #000;
            transition: 0.1s;
        }
        .pag-btn:hover:not(.active):not(:disabled) { background: var(--primary); transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #000; }
        .pag-btn.active { background: var(--black); color: var(--primary); box-shadow: none; transform: translate(4px, 4px); }
        .pag-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* MODAL (SYNCHRONIZED WITH TALENT.HTML) */
        #profile-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            z-index: 3000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .p-card { 
            background: #fff; 
            border: 4px solid var(--black); 
            box-shadow: 20px 20px 0 rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 900px; 
            position: relative; 
            overflow: hidden; 
        }
        .p-card-close { position: absolute; top: 15px; right: 15px; background: #000; color: #fff; border: none; width: 35px; height: 35px; font-weight: 900; cursor: pointer; z-index: 10; }
        
        .p-card-grid { display: grid; grid-template-columns: 0.4fr 0.6fr; }
        .p-card-left { padding: 40px; border-right: 4px solid var(--black); background: #fff; }
        .p-card-right { padding: 40px; background: #fafafa; }

        .p-card-avatar-wrap { margin-bottom: 25px; }
        .p-card-avatar { width: 100px; height: 100px; border: 4px solid #000; box-shadow: 6px 6px 0 #000; object-fit: cover; }
        
        .p-card-info h2 { font-size: 28px; font-weight: 900; text-transform: uppercase; line-height: 1; margin-bottom: 5px; }
        .p-card-handle { font-family: var(--font-mono); font-size: 13px; color: #888; font-weight: 700; margin-bottom: 20px; }
        
        .p-card-bio { font-size: 14px; line-height: 1.6; margin-bottom: 30px; font-weight: 500; color: #444; }
        .p-card-bio.placeholder { color: #aaa; font-style: italic; }

        .p-card-section { margin-bottom: 30px; }
        .p-card-section-title { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #bbb; letter-spacing: 1px; margin-bottom: 12px; font-family: var(--font-mono); }
        
        .p-card-socials { display: flex; gap: 10px; }
        .p-card-social-btn { width: 44px; height: 44px; border: 3px solid #000; display: flex; align-items: center; justify-content: center; background: #fff; box-shadow: 4px 4px 0 #000; transition: 0.1s; }
        .p-card-social-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #000; background: var(--primary); }

        .p-stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .p-stat-box { border: 3px solid #000; padding: 15px; background: #fff; }
        .p-stat-label { display: block; font-size: 9px; font-weight: 900; text-transform: uppercase; color: #888; margin-bottom: 4px; }
        .p-stat-val { font-family: var(--font-mono); font-size: 20px; font-weight: 900; }
        .p-stat-score { color: #00E676; }

        .p-card-skills { display: flex; flex-wrap: wrap; gap: 8px; }
        .p-card-skill-tag { border: 2px solid #000; padding: 4px 10px; font-size: 11px; font-weight: 900; font-family: var(--font-mono); background: #fff; text-transform: uppercase; }

        .p-card-meta-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .p-card-meta-card { border: 2px solid #eee; padding: 12px; display: flex; align-items: center; gap: 12px; background: #fff; }
        .p-card-meta-icon { width: 32px; height: 32px; border: 2px solid #000; display: flex; align-items: center; justify-content: center; background: #f0f0f0; }
        .p-card-meta-label { font-size: 9px; font-weight: 900; color: #888; text-transform: uppercase; }
        .p-card-meta-value { font-size: 12px; font-weight: 900; text-transform: uppercase; }

        .p-card-primary-btn {
            background: var(--black);
            color: var(--primary);
            border: 3px solid var(--black);
            padding: 15px;
            width: 100%;
            font-weight: 900;
            font-family: var(--font-main);
            text-transform: uppercase;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 6px 6px 0 var(--primary);
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .p-card-primary-btn:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0 var(--primary); }

        .is-pro-card { border-color: var(--primary); }
        .is-pro-card .p-card-left { background: #f6fffb; }

        @media (max-width: 850px) {
            .p-card-grid { grid-template-columns: 1fr; }
            .p-card-left { border-right: none; border-bottom: 4px solid var(--black); }
            .p-card { max-width: 500px; max-height: 85vh; overflow-y: auto; }
            .hero-title { font-size: 48px; }
            .user-card { grid-template-columns: 40px 60px 1fr; gap: 15px; padding: 15px; }
            .u-points { grid-column: span 3; text-align: left; padding-top: 15px; border-top: 2px solid #eee; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo"><span class="logo-box">CC</span> CREATORCHAIN</a>
        <nav style="display:flex; gap:25px; align-items:center;">
            <a href="index.html" style="text-decoration:none; color:#000; font-family:var(--font-mono); font-weight:700; font-size:12px;">HOME</a>
            <div id="auth-nav-box"></div>
        </nav>
    </header>

    <div class="container">
        <section class="hero">
            <h1 class="hero-title">COMMUNITY<br>LEADERBOARD</h1>
            <div class="hero-tag">OUR TOP CONTRIBUTORS</div>
        </section>

        <div id="leaderboard-root" class="leaderboard-list">
            <div style="text-align: center; padding: 100px; font-family: var(--font-mono); font-weight: 900; letter-spacing: 2px;">SYNCHRONIZING DATA...</div>
        </div>

        <div id="pagination-root" class="pagination"></div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" onclick="closeModal()">
        <div id="modal-body" onclick="event.stopPropagation()"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mwefmtmcljdsptcgowmb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13ZWZtdG1jbGpkc3B0Y2dvd21iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDM1MTIsImV4cCI6MjA5MDM3OTUxMn0.MWkosFtcKB5UAQGvNTB6fABEIMfkgzXgnwb_17pJabU';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let fullData = [];
        let currentPage = 1;
        const perPage = 10;

        async function init() {
            checkUser();
            await loadData();
        }

        async function checkUser() {
            try {
                const { data: { user } } = await db.auth.getUser();
                if (user) {
                    const { data: profile } = await db.from('user_profiles').select('avatar_url, username').eq('user_id', user.id).single();
                    const pic = profile?.avatar_url || user.user_metadata.avatar_url || `https://unavatar.io/twitter/${profile?.username || 'user'}`;
                    document.getElementById('auth-nav-box').innerHTML = `<img src="${pic}" style="width:28px; height:28px; border:2px solid #000; object-fit:cover;" onerror="this.src='https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png'">`;
                } else {
                    document.getElementById('auth-nav-box').innerHTML = `<a href="index.html" style="font-weight:900; font-family:var(--font-mono); font-size:11px; color:#000; text-decoration:none;">LOGIN</a>`;
                }
            } catch (e) {}
        }

        function getBadgeHtml(p, size = 'small') {
            if (!p) return '';
            const isPro = p.badge_level === 'pro' || (p.approved_submissions || 0) > 5;
            const isVerified = p.is_verified;
            
            let html = '';
            if (isPro) {
                html += `<span class="badge-pro" style="font-size: ${size === 'small' ? '9px' : '11px'}; margin-left:5px;">PRO</span>`;
            }
            if (isVerified) {
                html += `
                    <span class="verification-badge" style="color:var(--primary); margin-left:5px; vertical-align:middle; display:inline-flex; align-items:center;">
                        <svg viewBox="0 0 24 24" width="${size === 'small' ? '14' : '22'}" height="${size === 'small' ? '14' : '22'}" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                    </span>
                `;
            }
            return html;
        }

        async function loadData() {
            const root = document.getElementById('leaderboard-root');
            try {
                const { data: listings, error: lErr } = await db.from('listings')
                    .select('submitted_by')
                    .eq('approval_status', 'approved')
                    .not('submitted_by', 'is', null);
                
                if (lErr) throw lErr;

                const counts = {};
                listings.forEach(l => {
                    let h = l.submitted_by.replace('@', '').trim();
                    if(h.toLowerCase() === 'anonymous' || !h) return;
                    counts[h] = (counts[h] || 0) + 1;
                });

                const handles = Object.keys(counts);
                const { data: profiles, error: pErr } = await db.from('user_profiles').select('*');
                if (pErr) throw pErr;

                fullData = handles.map(h => {
                    const p = profiles.find(pr => (pr.username || '').toLowerCase() === h.toLowerCase());
                    const avatar = p?.avatar_url || `https://unavatar.io/twitter/${h}`;
                    
                    return {
                        handle: h,
                        name: p?.name || h,
                        avatar: avatar,
                        count: counts[h],
                        is_verified: p?.is_verified || false,
                        badge: p?.badge_level || '',
                        location: p?.location || 'GLOBAL',
                        profile: p || { username: h, name: h, skills: [], bio: 'Active CreatorChain contributor.' }
                    };
                }).sort((a, b) => b.count - a.count);

                if (fullData.length === 0) {
                    root.innerHTML = '<div style="text-align: center; padding: 100px; font-family: var(--font-mono);">NO DATA DISCOVERED IN THE NETWORK.</div>';
                    return;
                }

                render();
            } catch (err) { 
                console.error("Leaderboard Error:", err);
                root.innerHTML = `<div style="text-align: center; padding: 100px; font-family: var(--font-mono); color:red;">DATA SYNC FAILED: ${err.message.toUpperCase()}</div>`;
            }
        }

        function render() {
            const root = document.getElementById('leaderboard-root');
            const pag = document.getElementById('pagination-root');
            root.innerHTML = '';
            pag.innerHTML = '';

            const start = (currentPage - 1) * perPage;
            const pageData = fullData.slice(start, start + perPage);

            pageData.forEach((u, i) => {
                const rank = start + i + 1;
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `
                    <div class="u-rank">#${rank.toString().padStart(2, '0')}</div>
                    <div class="u-pic" onclick="openPublicProfile('${u.handle}')">
                        <img src="${u.avatar}" onerror="this.src='https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png'">
                    </div>
                    <div class="u-info">
                        <h3 onclick="openPublicProfile('${u.handle}')" style="cursor:pointer;">
                            ${u.name.toUpperCase()} ${getBadgeHtml(u.profile)}
                        </h3>
                        <div class="u-handle">
                            @${u.handle.toLowerCase()} 
                            ${u.location ? `<span class="u-loc"><i data-lucide="map-pin" style="width:10px; height:10px; vertical-align:middle; margin-right:4px;"></i> ${u.location}</span>` : ''}
                        </div>
                    </div>
                    <div class="u-points">
                        <div class="p-val">${u.count}</div>
                        <div class="p-lbl">POINTS</div>
                    </div>
                `;
                root.appendChild(card);
            });

            const total = Math.ceil(fullData.length / perPage);
            if (total > 1) {
                const prev = document.createElement('button');
                prev.className = 'pag-btn';
                prev.innerText = 'PREV';
                prev.disabled = currentPage === 1;
                prev.onclick = () => { currentPage--; render(); window.scrollTo({top: 400, behavior: 'smooth'}); };
                pag.appendChild(prev);

                for(let i=1; i<=total; i++) {
                    if (total > 8 && i > 3 && i < total - 2 && (i < currentPage - 1 || i > currentPage + 1)) {
                        if (i === 4 || i === total - 3) {
                            const d = document.createElement('span'); d.innerText = '...'; d.style.fontWeight='900'; pag.appendChild(d);
                        }
                        continue;
                    }
                    const btn = document.createElement('button');
                    btn.className = `pag-btn ${i === currentPage ? 'active' : ''}`;
                    btn.innerText = i;
                    btn.onclick = () => { currentPage = i; render(); window.scrollTo({top: 400, behavior: 'smooth'}); };
                    pag.appendChild(btn);
                }

                const next = document.createElement('button');
                next.className = 'pag-btn';
                next.innerText = 'NEXT';
                next.disabled = currentPage === total;
                next.onclick = () => { currentPage++; render(); window.scrollTo({top: 400, behavior: 'smooth'}); };
                pag.appendChild(next);
            }

            lucide.createIcons();
        }

        function openPublicProfile(handle) {
            const user = fullData.find(u => u.handle.toLowerCase() === handle.toLowerCase());
            if (!user) return;
            
            const p = user.profile;
            const body = document.getElementById('modal-body');
            const skills = p?.skills || [];
            const isPro = p?.badge_level === 'pro' || (user.count || 0) > 5;
            const score = p?.reputation_score || Math.floor(Math.random() * 20) + 80;
            
            body.innerHTML = `
                <div class="p-card ${isPro ? 'is-pro-card' : ''}">
                    <button class="p-card-close" onclick="closeModal()">✕</button>
                    
                    <div class="p-card-grid">
                        <div class="p-card-left">
                            <div class="p-card-avatar-wrap">
                                <img src="${user.avatar}" class="p-card-avatar" onerror="this.src='https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png'">
                            </div>
                            <div class="p-card-info">
                                <h2>
                                    ${user.name.toUpperCase()}
                                    ${getBadgeHtml(p, 'medium')}
                                </h2>
                                <div class="p-card-handle">@${user.handle.toLowerCase()}</div>
                            </div>

                            <div class="p-card-bio ${!p?.bio ? 'placeholder' : ''}">
                                ${p?.bio || 'Verified ecosystem contributor. Actively participating in community projects and technical development within the CreatorChain network.'}
                            </div>

                            <div class="p-card-section">
                                <div class="p-card-section-title">Identity Protocols</div>
                                <div class="p-card-socials">
                                    ${p?.twitter ? `<a href="https://x.com/${p.twitter.replace('@','')}" target="_blank" class="p-card-social-btn">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="#000"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                                    </a>` : ''}
                                    ${p?.github ? `<a href="${p.github.startsWith('http')?p.github:'https://github.com/'+p.github.replace('@','')}" target="_blank" class="p-card-social-btn">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="#000"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                                    </a>` : ''}
                                </div>
                            </div>

                            <button class="p-card-primary-btn" onclick="shareProfile('${user.handle}')">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
                                COPY_PROFILE_LINK
                            </button>
                        </div>

                        <div class="p-card-right">
                            <div class="p-card-section">
                                <div class="p-card-section-title">Network Reputation</div>
                                <div class="p-stats-grid">
                                    <div class="p-stat-box">
                                        <span class="p-stat-label">Trust Score</span>
                                        <span class="p-stat-val p-stat-score">${score}%</span>
                                    </div>
                                    <div class="p-stat-box">
                                        <span class="p-stat-label">Approved Wins</span>
                                        <span class="p-stat-val">${user.count}</span>
                                    </div>
                                </div>
                            </div>

                            <div class="p-card-section">
                                <div class="p-card-section-title">Technical Mastery</div>
                                <div class="p-card-skills">
                                    ${skills.length ? skills.map(s => `<span class="p-card-skill-tag">${s}</span>`).join('') : '<span class="mono" style="font-size:11px; color:#aaa; font-weight:700;">NO SKILLS REGISTERED</span>'}
                                </div>
                            </div>

                            <div class="p-card-section">
                                <div class="p-card-section-title">Operational Context</div>
                                <div class="p-card-meta-grid">
                                    <div class="p-card-meta-card">
                                        <div class="p-card-meta-icon"><i data-lucide="shield-check" style="width:16px; color:#000;"></i></div>
                                        <div class="p-card-meta-info">
                                            <div class="p-card-meta-label">Level</div>
                                            <div class="p-card-meta-value">${p?.experience_level || 'BUILDER'}</div>
                                        </div>
                                    </div>
                                    <div class="p-card-meta-card">
                                        <div class="p-card-meta-icon"><i data-lucide="map-pin" style="width:16px; color:#000;"></i></div>
                                        <div class="p-card-meta-info">
                                            <div class="p-card-meta-label">Sector</div>
                                            <div class="p-card-meta-value">${user.location}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('profile-modal').style.display = 'flex';
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('profile-modal').style.display = 'none'; }
        
        function shareProfile(handle) {
            const url = `${window.location.origin}/?u=${handle}`;
            navigator.clipboard.writeText(url);
            alert('LINK COPIED: ' + url);
        }

        init();
    </script>
</body>
</html>
