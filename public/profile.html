<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Builder Profile | CreatorChain</title>
    <meta name="description" content="CreatorChain builder profile with skill-matched Web3 opportunities.">
    <link rel="icon" type="image/png" href="/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #8B5CF6;
            --accent: #00F5A0;
            --bg: #F4F4F0;
            --black: #000;
            --white: #fff;
            --muted: #64748B;
            --secondary: #FFD600;
            --font: 'Plus Jakarta Sans', sans-serif;
            --mono: 'Space Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: var(--font); color: var(--black); }

        /* NAV */
        nav {
            background: var(--white);
            border-bottom: 3px solid var(--black);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 20px; font-weight: 900; text-decoration: none; color: var(--black); display: flex; align-items: center; gap: 8px; }
        .logo img { height: 40px; }
        .nav-back {
            display: inline-flex; align-items: center; gap: 8px;
            font-family: var(--mono); font-size: 12px; font-weight: 700;
            padding: 8px 16px; border: 2px solid var(--black);
            background: var(--white); cursor: pointer; text-decoration: none;
            color: var(--black); box-shadow: 3px 3px 0 var(--black);
            transition: all 0.15s;
        }
        .nav-back:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--black); }

        /* PAGE LAYOUT */
        .page { max-width: 1100px; margin: 40px auto; padding: 0 24px 80px; display: grid; grid-template-columns: 360px 1fr; gap: 30px; }

        /* LEFT PANEL */
        .profile-panel {
            background: var(--white);
            border: 3px solid var(--black);
            box-shadow: 8px 8px 0 var(--black);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 90px;
            height: fit-content;
        }
        .profile-top {
            background: var(--black);
            padding: 32px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .profile-avatar {
            width: 90px; height: 90px;
            border: 4px solid var(--accent);
            object-fit: cover;
            box-shadow: 6px 6px 0 rgba(0,245,160,0.4);
            background: #222;
        }
        .profile-name {
            color: var(--white);
            font-size: 24px; font-weight: 900;
            margin-top: 16px; text-transform: uppercase;
            letter-spacing: -0.5px;
            display: flex; align-items: center; gap: 8px; justify-content: center;
        }
        .profile-handle { color: #888; font-family: var(--mono); font-size: 12px; margin-top: 4px; }
        .profile-bio { color: #aaa; font-size: 13px; margin-top: 12px; line-height: 1.6; font-style: italic; }

        .profile-body { padding: 28px; display: flex; flex-direction: column; gap: 24px; }

        .section-label {
            font-family: var(--mono); font-size: 10px; font-weight: 700;
            color: #999; text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
        }
        .section-label::after { content: ''; flex: 1; height: 1px; background: #eee; }

        /* STATS ROW */
        .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
        .stat-box { border: 2px solid var(--black); padding: 14px 10px; text-align: center; background: #fafafa; }
        .stat-val { font-family: var(--mono); font-size: 20px; font-weight: 900; display: block; }
        .stat-val.green { color: #00C853; }
        .stat-key { font-size: 9px; font-weight: 700; color: #999; text-transform: uppercase; margin-top: 3px; display: block; }

        /* SKILLS */
        .skills-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
        .skill-tag {
            font-family: var(--mono); font-size: 11px; font-weight: 700;
            padding: 5px 12px; border: 2px solid var(--black);
            background: var(--white); text-transform: uppercase;
        }

        /* WORK CONTEXT */
        .work-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .work-item { border: 2px solid var(--black); padding: 12px; background: #fafafa; display: flex; align-items: center; gap: 10px; }
        .work-icon { width: 28px; height: 28px; border: 2px solid var(--black); display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--white); }
        .work-key { font-family: var(--mono); font-size: 9px; color: #999; text-transform: uppercase; display: block; }
        .work-val { font-size: 13px; font-weight: 800; display: block; text-transform: capitalize; }

        /* SOCIAL LINKS */
        .social-row { display: flex; gap: 10px; }
        .social-btn {
            width: 38px; height: 38px; border: 2px solid var(--black);
            display: flex; align-items: center; justify-content: center;
            background: var(--white); color: var(--black);
            text-decoration: none; transition: 0.15s;
            box-shadow: 3px 3px 0 var(--black);
        }
        .social-btn:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--black); background: var(--accent); }

        /* SHARE BTN */
        .share-btn {
            width: 100%; padding: 15px; background: var(--black); color: var(--white);
            border: none; font-family: var(--mono); font-weight: 700; font-size: 13px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.15s; text-transform: uppercase;
        }
        .share-btn:hover { background: var(--accent); color: var(--black); }

        /* BADGE SEAL */
        .badge-seal {
            position: absolute; top: 14px; right: 14px;
            background: var(--secondary); color: #000;
            padding: 3px 9px; font-family: var(--mono); font-weight: 900;
            font-size: 9px; border: 2px solid #000; transform: rotate(2deg);
            box-shadow: 3px 3px 0 #000; letter-spacing: 0.5px;
        }

        /* RIGHT PANEL — OPPORTUNITIES */
        .opps-panel { display: flex; flex-direction: column; gap: 24px; }
        .opps-header {
            background: var(--white); border: 3px solid var(--black);
            padding: 24px 28px; box-shadow: 6px 6px 0 var(--black);
        }
        .opps-header h2 { font-size: 22px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; }
        .opps-header p { font-size: 13px; color: var(--muted); margin-top: 6px; font-family: var(--mono); }
        .match-tag {
            display: inline-block; background: var(--accent); color: #000;
            font-family: var(--mono); font-size: 10px; font-weight: 900;
            padding: 3px 10px; border: 2px solid #000; margin-top: 10px;
        }

        /* OPP CARD */
        .opp-card {
            background: var(--white); border: 3px solid var(--black);
            box-shadow: 6px 6px 0 var(--black);
            transition: all 0.2s; cursor: pointer; text-decoration: none;
            display: block; color: var(--black);
        }
        .opp-card:hover { transform: translate(-4px,-4px); box-shadow: 10px 10px 0 var(--primary); }
        .opp-card-top { padding: 20px 22px; border-bottom: 2px solid #eee; display: flex; gap: 14px; align-items: flex-start; }
        .opp-logo { width: 48px; height: 48px; border: 2px solid var(--black); object-fit: cover; background: #f0f0f0; flex-shrink: 0; }
        .opp-title { font-size: 16px; font-weight: 800; line-height: 1.3; }
        .opp-project { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 3px; }
        .opp-card-body { padding: 16px 22px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .opp-reward { font-family: var(--mono); font-size: 15px; font-weight: 900; color: #00C853; }
        .opp-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .opp-tag { font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 3px 9px; border: 2px solid var(--black); background: #f5f5f5; }
        .opp-tag.match { background: var(--accent); border-color: #000; }
        .opp-apply-btn {
            display: inline-flex; align-items: center; gap: 6px;
            font-family: var(--mono); font-size: 11px; font-weight: 900;
            padding: 8px 16px; background: var(--black); color: var(--white);
            border: 2px solid var(--black); text-decoration: none; transition: 0.15s;
        }
        .opp-apply-btn:hover { background: var(--primary); }
        .opp-match-bar { padding: 10px 22px; background: #f9f9f9; border-top: 1px dashed #ddd; display: flex; align-items: center; gap: 8px; }
        .match-score-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); border: 1px solid #000; }
        .match-score-text { font-family: var(--mono); font-size: 10px; font-weight: 700; color: #555; }

        /* EMPTY / LOADING */
        .state-box { background: var(--white); border: 3px dashed #ccc; padding: 60px 30px; text-align: center; }
        .state-box h3 { font-family: var(--mono); font-size: 16px; margin-bottom: 10px; }
        .state-box p { font-size: 13px; color: var(--muted); }

        /* NOT FOUND */
        .not-found-box { max-width: 500px; margin: 100px auto; text-align: center; padding: 0 24px; }
        .not-found-box h1 { font-size: 80px; font-weight: 900; font-family: var(--mono); opacity: 0.1; }
        .not-found-box h2 { font-size: 24px; font-weight: 900; margin-top: -20px; margin-bottom: 12px; }

        @media (max-width: 900px) {
            .page { grid-template-columns: 1fr; }
            .profile-panel { position: static; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo">
        <img src="/logo.png" alt="CreatorChain">
        CREATOR<span style="-webkit-text-stroke:1.5px #000; color:transparent;">CHAIN</span>
    </a>
    <a href="/talent.html" class="nav-back">
        <i data-lucide="arrow-left" style="width:14px;height:14px;"></i> BUILDER NETWORK
    </a>
</nav>

<div id="page-root"></div>

<script>
const SUPABASE_URL = 'https://mwefmtmcljdsptcgowmb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_SdGsB-hhvxF2-rq_fBiM0A_y3_mQn2n';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(location.search);
const handle = (params.get('u') || '').replace('@','').trim();

// ── badge ──────────────────────────────────────────────────────
function badgeSvg(p) {
    if (!p) return '';
    const isPro = p.badge_level === 'pro' || (p.approved_submissions || 0) > 5;
    const isVerified = p.is_verified;
    if (!isPro && !isVerified) return '';
    const color = isPro ? '#FFD600' : '#00E676';
    const ck = isPro ? '#000' : '#fff';
    return `<svg viewBox="0 0 24 24" width="18" height="18" fill="none"><circle cx="12" cy="12" r="11" fill="${color}"/><path d="M17.33 8.33L10 15.67L6.67 12.33" stroke="${ck}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

// ── skill match score ──────────────────────────────────────────
function matchScore(userSkills, listing) {
    if (!userSkills || userSkills.length === 0) return 0;
    const haystack = [
        listing.title, listing.description, listing.project,
        listing.section, listing.about_project, listing.mission,
        listing.scope_requirements
    ].join(' ').toLowerCase();

    let hits = 0;
    userSkills.forEach(s => {
        if (haystack.includes(s.toLowerCase())) hits++;
    });
    return hits;
}

// ── opportunity cards ──────────────────────────────────────────
function renderOppCard(l, userSkills) {
    const score = matchScore(userSkills, l);
    const logo = l.logo || `https://ui-avatars.com/api/?name=${encodeURIComponent(l.project)}&background=000&color=00F5A0&size=48`;
    const reward = l.reward || 'TBA';
    const applyUrl = l.apply_url || '#';
    const matchedSkills = (userSkills || []).filter(s =>
        [l.title, l.description, l.section, l.about_project, l.scope_requirements]
            .join(' ').toLowerCase().includes(s.toLowerCase())
    );
    const sectionLabel = (l.section || 'opportunity').toUpperCase();

    return `
    <a class="opp-card" href="${applyUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
        <div class="opp-card-top">
            <img class="opp-logo" src="${logo}" alt="${l.project}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(l.project)}&background=111&color=00F5A0&size=48'">
            <div style="flex:1; min-width:0;">
                <div class="opp-title">${l.title}</div>
                <div class="opp-project">${l.project} · ${sectionLabel}</div>
                <div style="font-size:12px; color:#555; margin-top:6px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">
                    ${l.description || ''}
                </div>
            </div>
        </div>
        <div class="opp-card-body">
            <span class="opp-reward">${reward}</span>
            <div class="opp-tags">
                <span class="opp-tag">${sectionLabel}</span>
                ${matchedSkills.slice(0,3).map(s => `<span class="opp-tag match">${s}</span>`).join('')}
            </div>
            <a class="opp-apply-btn" href="${applyUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
                APPLY NOW <i data-lucide="external-link" style="width:11px;height:11px;"></i>
            </a>
        </div>
        ${score > 0 ? `
        <div class="opp-match-bar">
            <div class="match-score-dot"></div>
            <span class="match-score-text">${score} SKILL MATCH${score > 1 ? 'ES' : ''} DETECTED · STRONG FIT</span>
        </div>` : ''}
    </a>`;
}

// ── main render ────────────────────────────────────────────────
async function render() {
    const root = document.getElementById('page-root');

    if (!handle) {
        root.innerHTML = `<div class="not-found-box">
            <h1>404</h1>
            <h2>No handle provided</h2>
            <p style="color:var(--muted); margin-bottom:24px;">A username is required to load a profile.</p>
            <a href="/talent.html" class="nav-back">← BROWSE BUILDERS</a>
        </div>`;
        lucide.createIcons();
        return;
    }

    root.innerHTML = `<div style="text-align:center; padding:100px 20px;">
        <p style="font-family:var(--mono); font-size:13px; color:#999;">⬡ LOADING PROFILE...</p>
    </div>`;

    // Fetch profile
    const { data: profile, error } = await db.from('user_profiles')
        .select('*').eq('username', handle).single();

    if (error || !profile) {
        root.innerHTML = `<div class="not-found-box">
            <h1>404</h1>
            <h2>Builder not found</h2>
            <p style="color:var(--muted); margin-bottom:24px;">@${handle} doesn't exist or hasn't set up their profile yet.</p>
            <a href="/talent.html" class="nav-back">← BROWSE BUILDERS</a>
        </div>`;
        lucide.createIcons();
        return;
    }

    const userSkills = profile.skills || [];
    const avatar = profile.avatar_url || `https://unavatar.io/twitter/${handle}`;
    const isPro = profile.badge_level === 'pro' || (profile.approved_submissions || 0) > 5;
    const isTrusted = isPro || profile.is_verified;
    const score = profile.reputation_score || profile.score || 0;

    // Fetch opportunities — approved listings
    const { data: listings } = await db.from('listings')
        .select('*')
        .eq('approval_status', 'approved')
        .order('created_at', { ascending: false })
        .limit(100);

    // Score & rank
    let scored = (listings || []).map(l => ({ ...l, _score: matchScore(userSkills, l) }));

    // Sort: skill-matched first, then by recency
    scored.sort((a, b) => b._score - a._score || new Date(b.created_at) - new Date(a.created_at));

    // Pick 3–5
    const curated = scored.slice(0, 5);

    // Build page
    const socialLinks = [
        { key: 'github', icon: 'github', prefix: 'https://github.com/' },
        { key: 'discord', icon: 'message-circle', prefix: 'https://discord.com/users/' },
        { key: 'telegram', icon: 'send', prefix: 'https://t.me/' },
        { key: 'website', icon: 'globe', prefix: '' }
    ];

    const socialHtml = socialLinks.map(({ key, icon, prefix }) => {
        let val = profile[key];
        if (!val) return '';
        if (!val.startsWith('http')) val = prefix + val.replace('@', '');
        return `<a class="social-btn" href="${val}" target="_blank" rel="noopener" title="${key}">
            <i data-lucide="${icon}" style="width:16px;height:16px;"></i>
        </a>`;
    }).join('');

    const xLink = `<a class="social-btn" href="https://x.com/${handle}" target="_blank" rel="noopener" title="X / Twitter">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    </a>`;

    const oppsHtml = curated.length === 0
        ? `<div class="state-box">
            <h3>NO MATCHING OPPORTUNITIES</h3>
            <p>No approved listings match ${profile.name || handle}'s skill set right now.<br>Check back soon as new opportunities are added daily.</p>
          </div>`
        : curated.map(l => renderOppCard(l, userSkills)).join('');

    root.innerHTML = `
    <div class="page">
        <!-- LEFT: Profile Panel -->
        <aside class="profile-panel">
            <div class="profile-top">
                ${isTrusted ? `<div class="badge-seal">${isPro ? '★ PRO BUILDER' : '✓ TRUSTED BUILD'}</div>` : ''}
                <img class="profile-avatar" src="${avatar}" alt="${handle}"
                    onerror="this.src='https://ui-avatars.com/api/?name=${handle}&background=111&color=00F5A0&size=90'">
                <div class="profile-name">${profile.name || handle} ${badgeSvg(profile)}</div>
                <div class="profile-handle">@${handle}</div>
                ${profile.bio
                    ? `<div class="profile-bio">${profile.bio}</div>`
                    : `<div class="profile-bio">Add a bio to your profile to attract opportunities.</div>`}
            </div>

            <div class="profile-body">
                <!-- Stats -->
                <div>
                    <div class="section-label">REPUTATION & STATS</div>
                    <div class="stats-row">
                        <div class="stat-box">
                            <span class="stat-val green">${score}</span>
                            <span class="stat-key">TRUST SCORE</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-val">${profile.approved_submissions || 0}</span>
                            <span class="stat-key">APPROVED</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-val">${profile.total_submissions || 0}</span>
                            <span class="stat-key">TOTAL SUBS</span>
                        </div>
                    </div>
                </div>

                <!-- Skills -->
                ${userSkills.length > 0 ? `
                <div>
                    <div class="section-label">SKILLS & MASTERY</div>
                    <div class="skills-wrap">
                        ${userSkills.map(s => `<span class="skill-tag">${s}</span>`).join('')}
                    </div>
                </div>` : ''}

                <!-- Work Context -->
                <div>
                    <div class="section-label">WORK CONTEXT</div>
                    <div class="work-grid">
                        <div class="work-item">
                            <div class="work-icon"><i data-lucide="bar-chart-2" style="width:14px;height:14px;"></i></div>
                            <div><span class="work-key">LEVEL</span><span class="work-val">${profile.experience_level || 'N/A'}</span></div>
                        </div>
                        <div class="work-item">
                            <div class="work-icon"><i data-lucide="briefcase" style="width:14px;height:14px;"></i></div>
                            <div><span class="work-key">PREFERENCE</span><span class="work-val">${profile.work_preference || 'N/A'}</span></div>
                        </div>
                        <div class="work-item">
                            <div class="work-icon"><i data-lucide="map-pin" style="width:14px;height:14px;"></i></div>
                            <div><span class="work-key">LOCATION</span><span class="work-val">${profile.location || 'GLOBAL'}</span></div>
                        </div>
                        <div class="work-item">
                            <div class="work-icon"><i data-lucide="building-2" style="width:14px;height:14px;"></i></div>
                            <div><span class="work-key">COMPANY</span><span class="work-val">${profile.company || 'Freelance'}</span></div>
                        </div>
                    </div>
                </div>

                <!-- Identity Links -->
                ${(xLink + socialHtml).replace(/<a class="social-btn" href="" /g,'') !== '' ? `
                <div>
                    <div class="section-label">IDENTITY LINKS</div>
                    <div class="social-row">
                        ${xLink}
                        ${socialHtml}
                    </div>
                </div>` : ''}
            </div>

            <!-- Share -->
            <button class="share-btn" onclick="shareProfile()">
                <i data-lucide="share-2" style="width:15px;height:15px;"></i>
                SHARE PROFILE
            </button>
        </aside>

        <!-- RIGHT: Matched Opportunities -->
        <main class="opps-panel">
            <div class="opps-header">
                <h2>Matched <span style="-webkit-text-stroke:1.5px #000;color:transparent;">Opportunities</span></h2>
                <p>Curated based on @${handle}'s skills and expertise.</p>
                ${userSkills.length > 0
                    ? `<div class="match-tag">⬡ MATCHING: ${userSkills.slice(0,4).join(' · ')}</div>`
                    : ''}
            </div>
            ${oppsHtml}
            <a href="/" style="display:inline-flex; align-items:center; gap:8px; font-family:var(--mono); font-size:12px; font-weight:700; color:var(--muted); text-decoration:none; margin-top:10px;">
                <i data-lucide="grid" style="width:14px;height:14px;"></i> VIEW ALL OPPORTUNITIES →
            </a>
        </main>
    </div>`;

    document.title = `${profile.name || handle} | CreatorChain Builder Profile`;

    lucide.createIcons();
}

function shareProfile() {
    const url = window.location.href;
    if (navigator.share) {
        navigator.share({ title: `@${handle} on CreatorChain`, url });
    } else {
        navigator.clipboard.writeText(url).then(() => {
            const btn = document.querySelector('.share-btn');
            const orig = btn.innerHTML;
            btn.innerHTML = '✓ LINK COPIED!';
            setTimeout(() => { btn.innerHTML = orig; lucide.createIcons(); }, 2000);
        });
    }
}

render();
</script>
</body>
</html>
