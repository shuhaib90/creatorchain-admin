<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportunity Detail | CreatorChain</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #f5f0e8; --surface: #ffffff; --black: #0a0a0a;
            --primary: #00e87a; --secondary: #ffe600; --accent: #ff3b00;
            --discord: #0057ff; --admin: #7000ff; --muted: #555555;
            --border: 3px solid #0a0a0a; --shadow: 4px 4px 0px #0a0a0a;
            --white: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'Space Grotesk', sans-serif; color: var(--black); overflow-x: hidden; line-height: 1.3; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .mono { font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }
        
        .btn { border: var(--border); padding: 10px 20px; font-family: 'Space Mono', monospace; font-weight: 700; text-transform: uppercase; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: var(--shadow); border-radius: 0; font-size: 13px; }
        .btn:hover { transform: scale(1.05) translateY(-2px); box-shadow: 6px 6px 0 var(--black); }
        .btn-primary { background: var(--primary); color: var(--black); }
        .btn-black { background: var(--black); color: #fff; box-shadow: 4px 4px 0 var(--primary); }
        .btn-white { background: #fff; color: var(--black); }

        /* Opportunity Detail Styles */
        .project-detail-layout { display: grid; grid-template-columns: 320px 1fr; gap: 40px; margin-top: 30px; }
        .project-detail-sidebar { display: flex; flex-direction: column; gap: 30px; border-right: 3px solid var(--black); padding-right: 40px; }
        .sidebar-section-label { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); display: block; margin-bottom: 12px; letter-spacing: 1px; font-weight: 700; text-transform: uppercase; }
        
        .prize-pool-box { background: var(--black); color: #fff; padding: 25px; border: 4px solid var(--black); box-shadow: 8px 8px 0 var(--primary); position: relative; }
        .prize-total { font-size: 32px; font-weight: 900; margin-bottom: 20px; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 10px; color: var(--primary); }
        .prize-total span { font-size: 12px; font-family: 'Space Mono', monospace; color: #fff; opacity: 0.7; display: block; text-transform: uppercase; }
        .prize-list { display: flex; flex-direction: column; gap: 15px; position: relative; }
        .prize-item { display: flex; justify-content: space-between; align-items: center; position: relative; padding-left: 20px; }
        .prize-item::before { content: '→'; position: absolute; left: 0; color: var(--primary); font-weight: 900; }
        .prize-rank { font-family: 'Space Mono', monospace; font-size: 12px; opacity: 0.7; text-transform: uppercase; }
        .prize-value { font-weight: 900; font-size: 18px; color: #fff; }
        .prize-item.highlight .prize-value { color: var(--primary); font-size: 22px; }

        .submission-stats { display: grid; grid-template-columns: 1fr; gap: 15px; background: #fff; padding: 20px; border: 3px solid var(--black); box-shadow: 6px 6px 0 var(--black); }
        .stat-lbl { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; }
        .stat-val { font-size: 24px; font-weight: 900; color: var(--black); }

        .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .skill-tag { background: var(--black); color: var(--primary); padding: 5px 12px; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; border: 2px solid var(--black); text-transform: uppercase; }

        .project-detail-main { display: flex; flex-direction: column; gap: 40px; }
        .detail-section h3 { font-size: 14px; font-weight: 900; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-family: 'Space Mono', monospace; color: var(--black); background: var(--white); border: 3px solid var(--black); padding: 8px 15px; width: fit-content; box-shadow: 4px 4px 0 var(--black); text-transform: uppercase; }
        .detail-section p { font-size: 16px; line-height: 1.6; color: #333; font-family: 'Space Grotesk', sans-serif; }
        .detail-section ul { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 12px; }
        .detail-section ul li { position: relative; padding-left: 25px; font-size: 15px; line-height: 1.5; color: #444; }
        .detail-section ul li::before { content: '→'; position: absolute; left: 0; color: var(--primary); font-weight: 900; }

        .project-detail-header { border-bottom: 4px solid var(--black); padding-bottom: 30px; margin-bottom: 10px; }
        .detail-logo { width: 100px; height: 100px; border: 4px solid var(--black); background: #fff; padding: 10px; box-shadow: 8px 8px 0 var(--black); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .detail-logo img { width: 100%; height: 100%; object-fit: contain; }

        .status-indicator { display: flex; align-items: center; gap: 8px; background: var(--black); color: #fff; padding: 4px 12px; border: 2px solid var(--black); width: fit-content; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.active { background: var(--primary); box-shadow: 0 0 8px var(--primary); }
        .status-dot.ended { background: var(--accent); }

        /* APPLICATION MODAL (FORM) */
        .application-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(8px); padding: 20px; }
        .application-card { background: #fff; border: 4px solid var(--black); width: 100%; max-width: 500px; box-shadow: 20px 20px 0 var(--black); position: relative; }
        .application-header { background: var(--black); color: var(--primary); padding: 25px; border-bottom: 4px solid var(--black); }
        .application-body { padding: 30px; }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 900; margin-bottom: 8px; color: var(--black); text-transform: uppercase; }
        .field input, .field textarea { width: 100%; padding: 12px; border: 3px solid var(--black); font-family: inherit; font-size: 14px; font-weight: 600; outline: none; background: #fff; }
        .field input:focus { background: #f0fff8; border-color: var(--primary); }

        /* EXCLUSIVE EFFECTS */
        .exclusive-glow {
            border-color: #00f2ff !important;
            animation: exclusivePulse 3s infinite ease-in-out !important;
        }
        @keyframes exclusivePulse {
            0% { box-shadow: 0 0 10px rgba(0, 242, 255, 0.2), 6px 6px 0 var(--black); }
            50% { box-shadow: 0 0 25px rgba(0, 242, 255, 0.5), 8px 8px 0 var(--black); border-color: #7000ff !important; }
            100% { box-shadow: 0 0 10px rgba(0, 242, 255, 0.2), 6px 6px 0 var(--black); }
        }
        .exclusive-text {
            background: linear-gradient(90deg, #7000ff, #00f2ff, #7000ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            font-weight: 900;
        }
        @keyframes shine {
            to { background-position: 200% center; }
        }
        .exclusive-stamp {
            background: #00f2ff !important;
            color: var(--black) !important;
            border: 2px solid var(--black) !important;
            font-weight: 900 !important;
            box-shadow: 3px 3px 0 var(--black) !important;
            padding: 4px 10px;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            display: inline-block;
        }
        .exclusive-inner-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, rgba(0, 242, 255, 0.03) 0%, rgba(112, 0, 255, 0.03) 100%);
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .exclusive-inner-bg::after {
            content: "";
            position: absolute;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0, 242, 255, 0.05) 1px, rgba(0, 242, 255, 0.05) 2px);
            animation: scanline 10s linear infinite;
        }
        @keyframes scanline {
            from { transform: translateY(0); }
            to { transform: translateY(33.33%); }
        }

        #toast { position: fixed; bottom: 30px; right: 30px; z-index: 99999; display: flex; flex-direction: column; gap: 10px; }
        .toast-item { background: var(--black); color: #fff; padding: 14px 20px; border: 2px solid var(--primary); font-family: 'Space Mono', monospace; font-size: 13px; box-shadow: 4px 4px 0 var(--primary); }
        .toast-item.error { border-color: var(--accent); box-shadow: 4px 4px 0 var(--accent); }

        @media (max-width: 900px) {
            .project-detail-layout { grid-template-columns: 1fr; }
            .project-detail-sidebar { border-right: none; padding-right: 0; border-bottom: 3px solid var(--black); padding-bottom: 40px; }
        }
    </style>
</head>
<body>

<nav style="background:var(--white); border-bottom:4px solid var(--black); padding:15px 0; position:sticky; top:0; z-index:1000;">
    <div style="max-width:1200px; margin:0 auto; padding:0 20px; display:flex; justify-content:space-between; align-items:center;">
        <a href="/" style="text-decoration:none; display:flex; align-items:center; gap:10px;">
            <img src="/logo.png" alt="Logo" style="height:44px;">
            <span style="font-weight:900; font-size:20px; color:var(--black); font-family: 'Space Mono', monospace;">CREATOR<span style="-webkit-text-stroke: 1px var(--black); color:transparent;">CHAIN</span></span>
        </a>
        <a href="/" class="btn btn-black btn-sm" style="text-decoration:none;">&larr; BACK TO FEED</a>
    </div>
</nav>

<div class="container" id="loading-state">
    <div style="padding:100px; text-align:center;">
        <h2 class="mono">🔍 DECRYPTING_OPPORTUNITY_DATA...</h2>
    </div>
</div>

<div class="container" id="detail-container" style="display:none;">
    <div id="project-detail-content">
        <!-- Content Injected -->
    </div>
</div>

<!-- APPLICATION MODAL -->
<div id="application-modal" class="application-modal" onclick="if(event.target === this) closeApplicationForm()">
    <div class="application-card" onclick="event.stopPropagation()">
        <button onclick="closeApplicationForm()" style="position:absolute; top:-20px; right:-20px; background:var(--black); color:#fff; width:40px; height:40px; border:3px solid #fff; cursor:pointer; font-weight:900; font-size:20px; z-index:100;">✕</button>
        <div class="application-header">
            <h2 class="mono" style="margin:0; font-size:24px;">SUBMIT_PROPOSAL</h2>
            <p id="app-project-name" style="margin:5px 0 0 0; font-weight:800; opacity:0.8;"></p>
        </div>
        <div class="application-body">
            <div id="auth-check-msg" style="display:none; text-align:center; padding:20px;">
                <p class="mono" style="font-size:14px; margin-bottom:20px;">AUTHENTICATION_REQUIRED_TO_SUBMIT</p>
                <button onclick="signInWithX()" class="btn btn-black" style="width:100%;"><i data-lucide="twitter"></i> SIGN_IN_WITH_X</button>
            </div>
            
            <form id="proposal-form" onsubmit="handleProposalSubmit(event)">
                <input type="hidden" id="app-opportunity-id">
                
                <div class="field">
                    <label>WALLET_ADDRESS (FOR REWARDS) <span style="color:var(--accent)">*</span></label>
                    <input type="text" id="app-wallet" placeholder="0x..." required>
                    <p style="font-size:10px; color:var(--muted); margin-top:5px;">Enter the address where you'd like to receive prizes.</p>
                </div>

                <div class="field">
                    <label>SUBMISSION_LINK (POST/ARTICLE/PORTFOLIO) <span style="color:var(--accent)">*</span></label>
                    <input type="url" id="app-link" placeholder="https://x.com/... or https://github.com/..." required>
                </div>

                <div class="field">
                    <label>TELEGRAM_USERNAME <span style="color:var(--accent)">*</span></label>
                    <input type="text" id="app-telegram" placeholder="@username" required>
                </div>

                <div class="field">
                    <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                        <input type="checkbox" required style="width:20px; height:20px;">
                        <span style="font-size:11px; line-height:1.2;">I have followed the official project account and tagged @tmbfun in my post.</span>
                    </label>
                </div>

                <div class="field">
                    <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                        <input type="checkbox" required style="width:20px; height:20px;">
                        <span style="font-size:11px; line-height:1.2;">I agree to grant the project permanent worldwide commercial usage rights for this content.</span>
                    </label>
                </div>

                <button type="submit" id="submit-proposal-btn" class="btn btn-primary" style="width:100%; padding:18px; font-weight:900; font-size:18px; box-shadow:10px 10px 0 var(--black);">SEND_SUBMISSION &rarr;</button>
            </form>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
    const SUPABASE_URL = 'https://mwefmtmcljdsptcgowmb.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_SdGsB-hhvxF2-rq_fBiM0A_y3_mQn2n';
    let db;

    function showToast(msg, type='success') {
        const container = document.getElementById('toast');
        const el = document.createElement('div');
        el.className = `toast-item ${type==='error'?'error':''}`;
        el.textContent = msg;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }

    async function signInWithX() {
        const { error } = await db.auth.signInWithOAuth({
            provider: 'twitter',
            options: { redirectTo: window.location.href }
        });
        if (error) showToast('Auth error: ' + error.message, 'error');
    }

    async function init() {
        const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
        db = createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (!id) {
            window.location.href = '/';
            return;
        }

        const { data: item, error } = await db.from('opportunities').select('*').eq('id', id).single();
        
        if (error || !item) {
            const { data: listData, error: listError } = await db.from('listings').select('*').eq('id', id).single();
            if (listError || !listData) {
                document.getElementById('loading-state').innerHTML = '<div style="padding:100px; text-align:center;"><h2 class="mono">⚠️ OPPORTUNITY_NOT_FOUND</h2><a href="/" class="btn btn-primary">RETURN_HOME</a></div>';
                return;
            }
            renderDetail(listData);
        } else {
            item.is_exclusive = true;
            item.project = item.project_name;
            renderDetail(item);
        }
    }


    function renderDetail(item) {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('detail-container').style.display = 'block';

        const parseReward = (str) => {
            if(!str) return 0;
            const num = str.replace(/[^0-9]/g, '');
            return parseInt(num) || 0;
        };

        const prizeNumeric = parseReward(item.reward);
        const prizeTotal = item.reward || 'TBA';
        const hasTiers = item.prize_breakdown && (item.prize_breakdown.first || item.prize_breakdown.second || item.prize_breakdown.third);
        
        const isEnded = item.status === 'ended' || (item.deadline && new Date(item.deadline) < new Date());
        const logoHtml = item.logo ? `<img src="${item.logo}" onerror="this.src='/logo.png'">` : `<img src="/logo.png" style="opacity:0.5; object-fit:contain;">`;

        const skillsList = (item.skills || 'Community, Content, Growth').split(',').map(s => s.trim());
        const prize1 = item.prize_breakdown?.first || (prizeNumeric ? '$'+Math.round(prizeNumeric*0.5) : 'TBA');
        const prize2 = item.prize_breakdown?.second || (prizeNumeric ? '$'+Math.round(prizeNumeric*0.3) : 'TBA');
        const prize3 = item.prize_breakdown?.third || (prizeNumeric ? '$'+Math.round(prizeNumeric*0.2) : 'TBA');

        const scopeHtml = item.scope_requirements 
            ? item.scope_requirements.split('\n').filter(l => l.trim()).map(l => `<li>${l.replace(/^[•\-\*]\s*/, '')}</li>`).join('')
            : `<li>Contribute to the ${item.project} ecosystem</li><li>Follow official requirements listed in the external link</li>`;

        const content = `
            <div class="project-detail-header">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div style="display:flex; gap:20px; align-items:center;">
                        <div class="detail-logo ${item.is_exclusive?'exclusive-glow':''}">${logoHtml}</div>
                        <div>
                            <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px;">
                                <span class="mono ${item.is_exclusive?'exclusive-text':''}" style="font-size:12px; ${!item.is_exclusive?'color:var(--muted)':''}">${item.project.toUpperCase()}</span>
                                
                                ${item.is_exclusive ? `
                                    <div class="exclusive-stamp">
                                        <span class="mono" style="font-size:10px;">CREATORCHAIN_EXCLUSIVE</span>
                                    </div>
                                ` : ''}

                                <div class="status-indicator">
                                    <div class="status-dot ${isEnded?'ended':'active'}"></div>
                                    <span class="mono" style="font-size:10px;">${isEnded?'SUBMISSIONS_CLOSED':'SUBMISSIONS_OPEN'}</span>
                                </div>
                            </div>
                            <h2 style="font-size:32px; letter-spacing:-1px; margin:0;">${item.title}</h2>
                        </div>
                    </div>
                    ${item.twitter_url ? `
                        <a href="${item.twitter_url}" target="_blank" class="btn btn-black" style="display:flex; align-items:center; gap:10px; padding:12px 20px; text-decoration:none;">
                            <span class="mono" style="font-size:12px;">FOLLOW_ON</span>
                            <span style="font-size:20px; line-height:1;">𝕏</span>
                        </a>
                    ` : ''}
                </div>
            </div>

            <div class="project-detail-layout">
                ${item.is_exclusive ? '<div class="exclusive-inner-bg"></div>' : ''}
                <div class="project-detail-sidebar" style="position:relative; z-index:1;">
                    <div>
                        <span class="sidebar-section-label">REWARDS_POOL</span>
                        <div class="prize-pool-box" style="${!hasTiers ? 'padding:35px 25px;' : ''}">
                            <div class="prize-total" style="${!hasTiers ? 'border-bottom:none; margin-bottom:0; padding-bottom:0;' : ''}">
                                ${prizeTotal} 
                                <span>${hasTiers ? 'Total Pool' : 'Reward Details'}</span>
                            </div>
                            
                            ${hasTiers ? `
                            <div class="prize-list" style="margin-top:20px;">
                                <div class="prize-item highlight">
                                    <span class="prize-rank">1st Prize</span>
                                    <span class="prize-value">${prize1}</span>
                                </div>
                                <div class="prize-item">
                                    <span class="prize-rank">2nd Prize</span>
                                    <span class="prize-value">${prize2}</span>
                                </div>
                                <div class="prize-item">
                                    <span class="prize-rank">3rd Prize</span>
                                    <span class="prize-value">${prize3}</span>
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    </div>

                    <div class="submission-stats" style="border:3px solid #000; padding:20px; background:#fff; box-shadow:6px 6px 0 #000; margin-bottom:25px;">
                        <div class="mono" style="font-size:10px; color:var(--muted); margin-bottom:12px; text-align:center; letter-spacing:1px;">TIME_REMAINING</div>
                        <div style="display:flex; justify-content:center; align-items:baseline; gap:12px;">
                            ${(() => {
                                if (!item.deadline || item.deadline === 'N/A' || item.deadline === 'OPEN') {
                                    return '<span class="mono" style="font-size:24px; font-weight:900;">N/A</span>';
                                }
                                const diff = new Date(item.deadline) - new Date();
                                if (diff <= 0) return '<span class="mono" style="font-size:24px; font-weight:900; color:var(--accent);">ENDED</span>';
                                
                                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                                
                                if (days > 0) {
                                    return `
                                        <div style="text-align:center;">
                                            <span class="mono" style="font-size:32px; font-weight:900; line-height:1;">${days}</span>
                                            <span class="mono" style="font-size:10px; display:block; color:var(--muted); margin-top:2px;">DAYS</span>
                                        </div>
                                        <div style="text-align:center;">
                                            <span class="mono" style="font-size:32px; font-weight:900; line-height:1;">${hours}</span>
                                            <span class="mono" style="font-size:10px; display:block; color:var(--muted); margin-top:2px;">HRS</span>
                                        </div>
                                    `;
                                }
                                return `
                                    <div style="text-align:center;">
                                        <span class="mono" style="font-size:32px; font-weight:900; line-height:1;">${hours}</span>
                                        <span class="mono" style="font-size:10px; display:block; color:var(--muted); margin-top:2px;">HOURS</span>
                                    </div>
                                `;
                            })()}
                        </div>
                    </div>

                    <div>
                        ${isEnded ? `
                            <button class="btn btn-white" style="width:100%; padding:20px; font-weight:900; cursor:not-allowed; opacity:0.6;">ENDED</button>
                        ` : `
                            ${item.is_exclusive ? `
                                <button class="btn btn-primary" onclick="openApplicationForm('${item.id}', '${item.project.replace(/'/g, "\\'")}')" style="width:100%; padding:20px; font-weight:900; font-size:18px; box-shadow:8px 8px 0 #000;">APPLY_NOW &rarr;</button>
                            ` : `
                                <a href="${item.apply_url||'#'}" target="_blank" class="btn btn-primary" style="width:100%; padding:20px; font-weight:900; font-size:18px; box-shadow:8px 8px 0 #000; text-align:center;">APPLY_NOW &rarr;</a>
                            `}
                        `}
                    </div>

                    <div>
                        <span class="sidebar-section-label">SKILLS_REQUIRED</span>
                        <div class="skill-tags">
                            ${skillsList.map(s => `<div class="skill-tag">${s}</div>`).join('')}
                        </div>
                    </div>

                    <div style="margin-top:auto;">
                        <span class="sidebar-section-label">CONTACT</span>
                    <p style="font-size:12px; color:var(--muted);">Have questions? Reach out to the team via X.</p>
                        ${item.twitter_url ? `<a href="${item.twitter_url}" target="_blank" class="mono" style="font-size:10px; color:var(--primary); text-decoration:none;">MESSAGE TEAM ON X &rarr;</a>` : ''}
                    </div>
                </div>

                <div class="project-intel-card" style="position:relative; z-index:1;">
                    <div class="intel-section">
                        <div class="intel-title">
                            <i data-lucide="target" style="width:18px; height:18px;"></i>
                            <span>MISSION</span>
                        </div>
                        <p>${item.mission || item.description || 'No detailed mission available.'}</p>
                    </div>

                    ${item.about_project ? `
                    <div class="detail-section">
                        <h3><i data-lucide="info" style="width:20px; color:var(--primary)"></i> ABOUT_PROJECT</h3>
                        <p>${item.about_project}</p>
                    </div>
                    ` : ''}

                    <div class="detail-section">
                        <h3><i data-lucide="list-checks" style="width:20px; color:var(--primary)"></i> SCOPE_&_REQUIREMENTS</h3>
                        <ul>
                            ${scopeHtml}
                        </ul>
                    </div>

                    <div class="detail-section">
                        <h3><i data-lucide="file-text" style="width:20px; color:var(--primary)"></i> SUBMISSION_GUIDELINES</h3>
                        <p>${item.is_exclusive ? 'Submit your live links via the "Apply Now" button. Ensure your wallet address is correct as rewards are distributed automatically upon verification.' : 'Follow the application link to apply on the project\'s official platform.'}</p>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('project-detail-content').innerHTML = content;
        lucide.createIcons();
    }

    async function openApplicationForm(id, projectName) {
        document.getElementById('app-opportunity-id').value = id;
        document.getElementById('app-project-name').textContent = projectName.toUpperCase();
        
        const { data: { user } } = await db.auth.getUser();
        if (!user) {
            document.getElementById('proposal-form').style.display = 'none';
            document.getElementById('auth-check-msg').style.display = 'block';
        } else {
            document.getElementById('proposal-form').style.display = 'block';
            document.getElementById('auth-check-msg').style.display = 'none';
        }

        document.getElementById('application-modal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
        lucide.createIcons();
    }

    function closeApplicationForm() {
        document.getElementById('application-modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    async function handleProposalSubmit(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-proposal-btn');
        btn.disabled = true;
        btn.textContent = 'SENDING_PROPOSAL...';

        const opportunity_id = document.getElementById('app-opportunity-id').value;
        const wallet = document.getElementById('app-wallet').value;
        const link = document.getElementById('app-link').value;
        const telegram = document.getElementById('app-telegram').value;

        const { data: { user } } = await db.auth.getUser();
        if (!user) {
            showToast('Please sign in first', 'error');
            btn.disabled = false;
            btn.textContent = 'SEND_SUBMISSION &rarr;';
            return;
        }

        const payload = {
            opportunity_id,
            user_id: user.id, // Use actual user.id from Supabase Auth
            portfolio_links: link,
            message: JSON.stringify({ 
                telegram, 
                wallet_address: wallet,
                submitted_at: new Date().toISOString(),
                user_handle: user.user_metadata.user_name || user.email
            }),
            status: 'pending'
        };

        const { error } = await db.from('applications').insert([payload]);

        if (error) {
            console.error(error);
            showToast('Failed to send proposal: ' + error.message, 'error');
        } else {
            showToast('🚀 Proposal sent successfully!');
            closeApplicationForm();
        }
        
        btn.disabled = false;
        btn.textContent = 'SEND_SUBMISSION &rarr;';
    }

    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
